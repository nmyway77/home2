<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026년 3월 모의고사 한줄해석 — 목동서로영어학원</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f1ec;--navy:#1F3864;--blue-card:#EBF3FB;--blue-border:#2E75B6;--purple-card:#F3E8FF;--purple-border:#5B2D8E;--gold2:#f0d070;--shadow:rgba(31,56,100,0.10);--text:#1a1a2e;--text-sub:#4a4a6a;--orange:#E65100;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);font-family:'Noto Sans KR',sans-serif;min-height:100vh;color:var(--text);}
.top-nav{position:fixed;top:0;left:0;right:0;z-index:200;background:var(--navy);box-shadow:0 3px 16px rgba(31,56,100,0.35);display:flex;align-items:center;padding:0 16px;height:48px;gap:12px;}
.home-btn{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;color:rgba(255,255,255,0.7);text-decoration:none;padding:4px 10px;border-radius:4px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);transition:all 0.2s;white-space:nowrap;}
.home-btn:hover{background:rgba(255,255,255,0.14);color:white;}
.nav-title{font-family:'JetBrains Mono',monospace;font-size:11px;color:rgba(255,255,255,0.5);letter-spacing:1px;}
.nav-badge{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--gold2);border:1px solid rgba(201,168,76,0.3);padding:3px 10px;border-radius:3px;white-space:nowrap;}

.wrap{max-width:860px;margin:0 auto;padding:72px 16px 64px;}

/* 페이지 헤더 */
.page-header{margin:0 0 32px;border-left:5px solid var(--navy);padding-left:20px;}
.page-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--blue-border);margin-bottom:8px;}
.page-title{font-family:'Playfair Display',serif;font-size:clamp(20px,4vw,32px);font-weight:700;color:var(--navy);line-height:1.2;margin-bottom:6px;}
.page-sub{font-size:12px;color:var(--text-sub);font-weight:300;}

/* 학년 탭 */
.grade-tabs{display:flex;gap:10px;margin-bottom:28px;flex-wrap:wrap;}
.grade-tab{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;padding:9px 22px;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:all 0.2s;}
.grade-tab.g1{background:white;color:var(--navy);border-color:rgba(31,56,100,0.2);}
.grade-tab.g1.active{background:var(--navy);color:white;}
.grade-tab.g2{background:white;color:#5B2D8E;border-color:rgba(91,45,142,0.2);}
.grade-tab.g2.active{background:#5B2D8E;color:white;}
.grade-tab.g3{background:white;color:var(--orange);border-color:rgba(230,81,0,0.2);}
.grade-tab.g3.active{background:var(--orange);color:white;}

/* 섹션 */
.section{display:none;}
.section.active{display:block;}
.section-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--blue-border);margin-bottom:14px;margin-top:4px;}

/* 카드 그리드 */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-bottom:28px;}

/* 문제 카드 */
.num-card{display:flex;align-items:center;gap:14px;background:white;border-radius:12px;padding:16px 18px;box-shadow:0 2px 12px var(--shadow);border:1px solid rgba(46,117,182,0.12);cursor:pointer;transition:all 0.2s;text-decoration:none;color:inherit;}
.num-card:hover{transform:translateX(4px);box-shadow:0 4px 20px rgba(31,56,100,0.16);border-color:var(--blue-border);}
.num-card.grammar{border-color:rgba(91,45,142,0.18);}
.num-card.grammar:hover{border-color:var(--purple-border);box-shadow:0 4px 20px rgba(91,45,142,0.14);}

.num-badge{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:white;background:var(--navy);border-radius:8px;padding:6px 12px;white-space:nowrap;flex-shrink:0;min-width:46px;text-align:center;}
.num-card.grammar .num-badge{background:#5B2D8E;}

.card-body{flex:1;min-width:0;}
.card-en{font-family:'Playfair Display',serif;font-size:13px;font-weight:600;color:var(--navy);margin-bottom:3px;line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.num-card.grammar .card-en{color:#4A148C;}
.card-ko{font-size:11px;color:var(--text-sub);line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

.card-tag{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1px;background:var(--blue-card);color:var(--blue-border);border:1px solid rgba(46,117,182,0.2);border-radius:4px;padding:2px 7px;white-space:nowrap;flex-shrink:0;}
.num-card.grammar .card-tag{background:var(--purple-card);color:#5B2D8E;border-color:rgba(91,45,142,0.2);}

/* 준비 중 카드 */
.soon-card{display:flex;align-items:center;gap:14px;background:rgba(255,255,255,0.45);border-radius:12px;padding:16px 18px;border:1px dashed rgba(31,56,100,0.15);opacity:0.55;}
.soon-badge{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:white;background:#aaa;border-radius:8px;padding:6px 12px;white-space:nowrap;min-width:46px;text-align:center;}
.soon-body{flex:1;}
.soon-en{font-size:13px;color:#999;margin-bottom:2px;}
.soon-tag{font-family:'JetBrains Mono',monospace;font-size:9px;background:#eee;color:#aaa;border-radius:4px;padding:2px 7px;}

/* 번호 네비 바 */
.num-nav{background:var(--navy);border-radius:12px;padding:12px 16px;margin-bottom:24px;display:flex;flex-wrap:wrap;gap:6px;}
.num-btn{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;padding:6px 10px;border-radius:6px;cursor:pointer;background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.55);border:none;transition:all 0.2s;position:relative;}
.num-btn:hover{background:rgba(255,255,255,0.18);color:white;}
.num-btn.has-file{color:white;background:rgba(255,255,255,0.12);}
.num-btn.has-file::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:#f0a030;}
.num-btn.active-btn{background:var(--gold2);color:var(--navy);box-shadow:0 2px 8px rgba(240,208,112,0.35);}

footer{text-align:center;padding:32px 16px;font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(31,56,100,0.25);letter-spacing:1px;}
</style>
</head>
<body>
<nav class="top-nav">
  <a class="home-btn" href="index.html">🏠 홈</a>
  <span class="nav-title">2026년 3월 모의고사 · 한줄해석</span>
  <span class="nav-badge">✦ 재원생 전용</span>
</nav>

<div class="wrap">
  <div class="page-header">
    <div class="page-label">목동서로영어학원 · 2026년 3월 모의고사</div>
    <div class="page-title">한줄해석 자료실</div>
    <div class="page-sub">문장구조도 · 배열영작 · 어법 문제 · 단어장</div>
  </div>

  <!-- 학년 탭 -->
  <div class="grade-tabs">
    <button class="grade-tab g1 active" onclick="switchGrade('g1')">🟦 고1</button>
    <button class="grade-tab g2" onclick="switchGrade('g2')">🟪 고2</button>
    <button class="grade-tab g3" onclick="switchGrade('g3')">🟧 고3</button>
  </div>

  <!-- ══ 고1 ══ -->
  <div class="section active" id="sec-g1">
    <div class="section-label">📂 고1 · 문제 목록</div>

    <!-- 번호 네비 -->
    <div class="num-nav" id="nav-g1"></div>

    <div class="cards-grid" id="cards-g1"></div>
  </div>

  <!-- ══ 고2 ══ -->
  <div class="section" id="sec-g2">
    <div class="section-label">📂 고2 · 문제 목록</div>
    <div class="num-nav" id="nav-g2"></div>
    <div class="cards-grid" id="cards-g2"></div>
  </div>

  <!-- ══ 고3 ══ -->
  <div class="section" id="sec-g3">
    <div class="section-label">📂 고3 · 문제 목록</div>
    <div class="num-nav" id="nav-g3"></div>
    <div class="cards-grid" id="cards-g3"></div>
  </div>

</div>

<footer>✦ 2026년 3월 모의고사 한줄해석 자료 · 목동서로영어학원 · 0505.co.kr ✦</footer>

<script>
// ── 데이터 ──
const DATA = {
  g1: [
    {num:21, file:"mock_march_2026.html",   en:"Good Ancestors",                    ko:"좋은 조상이 된다는 것"},
    {num:22, file:"mock_2026_3_22.html",    en:"Neuroplasticity & Taste",           ko:"뇌의 적응력이 입맛을 바꾼다"},
    {num:23, file:null},
    {num:24, file:"mock_2026_3_24.html",    en:"Temptation Bundling",               ko:"나쁜 습관과 좋은 습관을 묶어라"},
    {num:25, file:null},
    {num:26, file:null},
    {num:27, file:null},
    {num:28, file:null},
    {num:29, file:null},
    {num:30, file:"mock_2026_3_30.html",    en:"Walking as Transportation",         ko:"걷기: 부담인가, 선택인가?"},
    {num:31, file:null},
    {num:32, file:"mock_2026_3_32.html",    en:"Illusion of Competence",            ko:"익숙함을 진짜 이해로 착각하지 마라"},
    {num:33, file:"mock_2026_3_33.html",    en:"Sumerian Numbers",                  ko:"수메르인이 발명한 '해방된 숫자'"},
    {num:34, file:"mock_2026_3_34.html",    en:"Ingroup Copying & Overimitation",   ko:"우리는 왜 싫어하는 사람도 따라 하는가?"},
    {num:35, file:"mock_2026_3_35.html",    en:"Set Point Theory",                  ko:"다이어트가 힘든 생물학적 이유"},
    {num:36, file:"mock_2026_3_36.html",    en:"Less Is More",                      ko:"단순함은 정말 아름다운가?"},
    {num:37, file:"mock_2026_3_37.html",    en:"The Plastics Industry",             ko:"플라스틱의 숨겨진 역사"},
    {num:38, file:"mock_2026_3_38.html",    en:"Kuhn Paradigm",                     ko:"과학은 진보가 아닌 시각의 전환이다"},
    {num:39, file:null},
    {num:40, file:"mock_2026_3_40.html",    en:"Underparenting & Urban Structure",  ko:"아이의 독립심을 위한 도시 환경"},
    {num:"41-42", file:"mock_2026_3_41.html", en:"Patience as Power",              ko:"인내는 약자의 덕목인가, 힘의 한 형태인가?"},
  ],
  g2: [
    {num:21, file:"mock_2026_3_21_g2.html", en:"Safe Learning Community",          ko:"안전한 교실이 수학을 바꾼다"},
  ],
  g3: [
    {num:21, file:"mock_2026_3_21_g3.html", en:"Innovation vs Invention",          ko:"혁신과 발명, 그리고 음악의 군비 경쟁"},
  ],
};

function buildSection(grade) {
  const items = DATA[grade];
  const navEl  = document.getElementById('nav-'+grade);
  const gridEl = document.getElementById('cards-'+grade);
  navEl.innerHTML=''; gridEl.innerHTML='';

  items.forEach(item => {
    // nav 버튼
    const btn = document.createElement('button');
    btn.className = 'num-btn' + (item.file ? ' has-file' : '');
    btn.textContent = item.num;
    if(item.file){
      btn.onclick = () => location.href = item.file;
      btn.title = item.en || '';
    }
    navEl.appendChild(btn);

    // 카드
    if(item.file){
      const a = document.createElement('a');
      a.href = item.file;
      a.className = 'num-card';
      a.innerHTML = `
        <span class="num-badge">${item.num}</span>
        <div class="card-body">
          <div class="card-en">${item.en}</div>
          <div class="card-ko">${item.ko}</div>
        </div>
        <span class="card-tag">완성</span>`;
      gridEl.appendChild(a);
    } else {
      const div = document.createElement('div');
      div.className = 'soon-card';
      div.innerHTML = `
        <span class="soon-badge">${item.num}</span>
        <div class="soon-body">
          <div class="soon-en">준비 중</div>
        </div>
        <span class="soon-tag">업로드 예정</span>`;
      gridEl.appendChild(div);
    }
  });
}

function switchGrade(grade){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.grade-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('sec-'+grade).classList.add('active');
  document.querySelector('.grade-tab.'+grade).classList.add('active');
}

// 초기 빌드
['g1','g2','g3'].forEach(buildSection);
</script>
</body>
</html>
