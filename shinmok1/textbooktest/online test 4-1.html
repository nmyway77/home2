.rpt-hero{background:linear-gradient(135deg,#0f1d33,#1a2a4a 40%,#2e4a80);border-radius:16px;padding:32px;margin-bottom:18px;}.rpt-row{display:grid;grid-template-columns:170px 1fr;gap:24px;align-items:center;}.rpt-circle{position:relative;width:160px;height:160px;margin:0 auto;}.rpt-circle svg{transform:rotate(-90deg);}.rc-bg{fill:none;stroke:rgba(255,255,255,.08);stroke-width:12;}.rc-fill{fill:none;stroke-width:12;stroke-linecap:round;}.rpt-cc{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}.rpt-cc .rn{font-family:'Playfair Display',serif;font-size:44px;color:#fff;font-weight:800;}.rpt-cc .ru{font-size:11px;color:#8aaad4;}

.admin-btn{position:fixed;bottom:16px;right:16px;background:var(--navy);color:#fff;border:none;border-radius:50%;width:44px;height:44px;font-size:18px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.25);z-index:100;display:flex;align-items:center;justify-content:center;}.admin-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center;}.admin-overlay.show{display:flex;}.admin-panel{background:#fff;border-radius:16px;padding:28px 32px;max-width:750px;width:92%;max-height:85vh;overflow-y:auto;}

@media(max-width:700px){.rpt-row{grid-template-columns:1fr;text-align:center;}.hd h1{font-size:20px;}}

<script>
const STORE_KEY='shin_p1';
const Q=[{"n": 1, "type": "grammar", "typeName": "어법", "typeColor": "#1F4E79", "pts": 3, "focus": "5곳 동시 검증", "prompt": "<div class=\"q-prompt\"><b>1.</b> 다음 글의 밑줄 친 부분 중 어법상 적절하지 <b>않은</b> 것은?</div>", "passage": "<div class=\"q-passage\">\n    Recently, an artist used an artificial intelligence (AI) system ① <u>to create</u> the image above for an art contest. The image won first place in the digital arts category. This ② <u>led</u> to a controversy in the art community. Some people complained that the artist simply provided the system with basic instructions and ③ <u>letting</u> it do all the work. They felt this wasn't fair to the rest of the artists in the contest. However, there were also people ④ <u>who</u> were excited by the potential of AI. Today, there are numerous AI programs that can create various forms of art ⑤ <u>including</u> images, songs, and novels.\n  </div>", "box": "", "choices": ["to create", "led", "letting", "who", "including"], "a": 2, "isWriting": false, "writingAns": "", "ansText": "③ letting → let", "detail": "📌 본문 해석: 최근 한 예술가가 인공지능(AI) 시스템을 이용해 미술 대회를 위해 위 이미지를 창작했다. 그 이미지는 디지털 아트 부문에서 1등을 차지했다. 이는 미술계에 논란을 일으켰다. 어떤 사람들은 그 예술가가 단순히 시스템에 기본 지시를 제공하고 모든 작업을 시스템이 하게 했을 뿐이라고 불평했다. 그들은 이것이 대회의 다른 예술가들에게 공정하지 않다고 느꼈다. 그러나 AI의 잠재력에 흥분한 사람들도 있었다. 오늘날 이미지·노래·소설을 포함한 다양한 형태의 예술을 만들 수 있는 수많은 AI 프로그램이 있다.📌 5개 밑줄 어법"}, {"n": 2, "type": "grammar", "typeName": "어법", "typeColor": "#1F4E79", "pts": 3, "focus": "한 점 함정 — allow의 5형식", "prompt": "<div class=\"q-prompt\"><b>2.</b> 다음 글의 (A), (B), (C)에서 어법에 맞는 표현으로 가장 적절한 것은?</div>", "passage": "<div class=\"q-passage\">\n    AI image generators create images based on our text requests. They do this by (A) <u>copy / copying</u> other images that were created by humans. The generators have the ability (B) <u>analyze / to analyze</u> millions of images and their corresponding descriptions. This allows them (C) <u>create / to create</u> works of art in a short time based on the provided instructions.\n  </div>", "box": "", "choices": ["(A)copy (B)to analyze (C)create", "(A)copying (B)analyze (C)create", "(A)copying (B)to analyze (C)to create", "(A)copy (B)analyze (C)to create", "(A)copying (B)analyze (C)to create"], "a": 2, "isWriting": false, "writingAns": "", "ansText": "③ copying / to analyze / to create", "detail": "📌 본문 해석: AI 이미지 생성기는 우리의 텍스트 요청에 기반해 이미지를 만든다. 그들은 인간이 창작한 다른 이미지를 (A)복제함으로써 이를 한다. 생성기는 수백만 개의 이미지와 그에 상응하는 설명을 (B)분석할 능력이 있다. 이는 그들이 제공된 지시에 기반해 짧은 시간에 예술 작품을 (C)창작하도록 허락한다.📌 (A) — 전치사 by + 동명사by + V-ing= \"~함으로써\". by는 전치사이므로 뒤에는 동명사(-ing) 형태.→copying(copy는 동사원형 — 전치사 뒤 부적합)📌 (B) — the ability + to"}, {"n": 3, "type": "grammar", "typeName": "어법", "typeColor": "#1F4E79", "pts": 2, "focus": "관계대명사 vs 관계부사", "prompt": "<div class=\"q-prompt\"><b>3.</b> 다음 글의 빈칸 (A)·(B)에 들어갈 말로 가장 적절한 것은?</div>", "passage": "<div class=\"q-passage\">\n    AI image generators have created a new field of digital art (A) <span class=\"q-blank\">__</span> traditional artistic skills are no longer the only path to creativity. This is (B) <span class=\"q-blank\">__</span> these programs can analyze millions of existing images and produce new works in mere seconds.\n  </div>", "box": "", "choices": ["(A)which (B)which", "(A)where (B)how", "(A)where (B)which", "(A)which (B)how", "(A)that (B)what"], "a": 1, "isWriting": false, "writingAns": "", "ansText": "② (A)where (B)how", "detail": "📌 본문 해석: AI 이미지 생성기는 전통적 예술 기술이 더 이상 창의성으로 가는 유일한 경로가 아닌 디지털 아트의 새로운 영역을 만들어냈다. 이것이 이 프로그램들이 수백만 개의 기존 이미지를 분석하고 단 몇 초 만에 새 작품을 생산할 수 있는 방식이다.📌 (A) 빈칸 분석선행사:a new field(장소·영역 의미)뒤 절:\"traditional artistic skills are no longer the only path\"—완전한 절(주어 skills + 동사 are + 보어 path)→ 관계부사where(장소·영역 + 완전한 절"}, {"n": 4, "type": "grammar", "typeName": "어법", "typeColor": "#1F4E79", "pts": 2, "focus": "분사구문 — 능동·수동", "prompt": "<div class=\"q-prompt\"><b>4.</b> 다음 문장 중 어법상 옳은 것은?</div>", "passage": "", "box": "", "choices": ["Creating from simple instructions, the AI image won first place.", "Created by an AI system, the image stirred controversy in the art community.", "Analyzing by millions of images, the generator can produce new artworks.", "Excited about the result, the controversy quickly spread online.", "Blending with Vermeer's painting, the cat photograph created the request."], "a": 1, "isWriting": false, "writingAns": "", "ansText": "②", "detail": "📌 5개 선지 한국어 해석 + 분사구문 분석①Creating from simple instructions, the AI image won first place.→ \"단순 지시로부터 창작하면서, AI 이미지가 1등을 차지했다\"오류!주어the AI image는 창작되는 객체(수동) →Creating → Created②Created by an AI system, the image stirred controversy in the art community.✓→ \"AI 시스템에 의해 창작된, 그 이미지는 미술계에 논란을 일으켰다.\"옳음.주어t"}, {"n": 5, "type": "grammar", "typeName": "어법", "typeColor": "#1F4E79", "pts": 3, "focus": "5곳 밑줄 — 어법 종합 검증", "prompt": "<div class=\"q-prompt\"><b>5.</b> 다음 글의 밑줄 친 부분 중 어법상 적절하지 <b>않은</b> 것은?</div>", "passage": "<div class=\"q-passage\">\n    Moreover, AI programs can mix the styles of existing images upon request. For example, you can blend a photograph of a cat ① <u>with</u> Johannes Vermeer's <i>Girl with a Pearl Earring</i>. These two images have a few differences. ② <u>However</u>, the overall design, the eyes, and the scarf around the head ③ <u>is</u> clearly based on Vermeer's painting. A simple request was ④ <u>enough</u> to create this complex and ⑤ <u>detailed</u> image.\n  </div>", "box": "", "choices": ["with", "However", "is", "enough", "detailed"], "a": 2, "isWriting": false, "writingAns": "", "ansText": "③ is → are", "detail": "📌 5개 밑줄 어법 분석①with—blend A with B(A를 B와 혼합) 정확한 전치사 ✓②However— 앞 문장(차이가 있다)과 뒤 문장(베르메르에 기반)이 대조 → 역접 부사 ✓③is ✗ 정답 — 주어 동사 일치 위반주어 분석:\"the overall design, the eyes, and the scarf around the head\"→ A, B, and C 형태의3개 명사구가 등위접속된 복수 주어. 따라서 동사도 복수형are여야 함.함정: 주어가 길어서\"the scarf\"(단수)에 동사가 일치한 것처럼 착각하기 쉬움.④"}, {"n": 6, "type": "grammar", "typeName": "어법", "typeColor": "#1F4E79", "pts": 2, "focus": "시제·태·동사 형태", "prompt": "<div class=\"q-prompt\"><b>6.</b> 다음 글의 (A)·(B)·(C)에서 어법에 맞는 표현으로 가장 적절한 것은?</div>", "passage": "<div class=\"q-passage\">\n    Recently, an artist (A) <u>has used / used</u> an AI system to create the image above. The image (B) <u>won / was won</u> first place in the digital arts category. The image (C) <u>created / was created</u> entirely by AI raised serious ethical questions.\n  </div>", "box": "", "choices": ["(A)has used (B)won (C)created", "(A)used (B)won (C)created", "(A)used (B)was won (C)was created", "(A)has used (B)was won (C)was created", "(A)used (B)won (C)was created"], "a": 1, "isWriting": false, "writingAns": "", "ansText": "② used / won / created", "detail": "📌 (A) 시제 — used시간 부사Recently(최근) + 명확한 과거 사건 →단순 과거사용.※ 함정:has used(현재완료)는 명확한 과거 시점(recently)과 충돌.→used※ 본문 원본도\"Recently, an artist used...\"로 단순 과거 사용📌 (B) 태 — won (능동)주어The image+ win▸win first place= \"1등을 차지하다\" —능동 표현(관용구)▸ 이미지가 1등을 \"차지하다\"이지 \"1등에게 받혀지다\"가 아님→won※ 함정:was won(수동)이 그럴듯해 보이지만 win firs"}, {"n": 7, "type": "reading", "typeName": "독해", "typeColor": "#2A8B7F", "pts": 3, "focus": "단락 일치 — 절대화·창작 함정", "prompt": "<div class=\"q-prompt\"><b>7.</b> 다음 글의 내용과 일치하지 <b>않는</b> 것은?</div>", "passage": "<div class=\"q-passage\">\n    [본문 — AI: Opportunity or Threat? + Example 1 전체]\n  </div>", "box": "", "choices": ["한 예술가가 AI 시스템을 사용해 만든 이미지가 디지털 아트 부문에서 1등을 차지했다.", "일부 사람들은 그 예술가가 시스템에 기본 지시만 제공했다며 불공평하다고 느꼈다.", "오늘날 이미지·노래·소설을 포함한 다양한 형태의 예술을 만드는 AI 프로그램이 있다.", "AI 이미지 생성기는오직 인간 예술가의 직접 감독 하에서만이미지를 만들 수 있다.", "AI 프로그램은 요청에 따라 기존 이미지의 스타일을 혼합할 수 있다."], "a": 3, "isWriting": false, "writingAns": "", "ansText": "④ \"오직 ~ 직접 감독 하에서만\" — 절대화·창작 함정", "detail": "📌 5개 선지 분석① \"1등 차지\" — 본문\"won first place in the digital arts category\"✓② \"기본 지시만 제공 / 불공평\" — 본문\"simply provided the system with basic instructions... wasn't fair\"✓③ \"이미지·노래·소설\" — 본문\"various forms of art including images, songs, and novels\"✓④\"오직 ~ 감독 하에서만\" ✗ 정답본문은\"AI image generators create images ba"}, {"n": 8, "type": "reading", "typeName": "독해", "typeColor": "#2A8B7F", "  정답본문 함의 정확 — 입력(simple) vs 출력(complex)의 대조② "}, {"n": 10, "type": "vocab", "typeName": "어휘", "typeColor": "#D97A47", "pts": 3, "focus": "SIGNATURE⭐ 시그니처: (A)~(D) 짝짓기", "prompt": "<div class=\"q-prompt\"><b>10.</b> 다음 글의 (A), (B), (C), (D)에서 문맥에 맞는 표현으로 가장 적절한 것은?</div>", "passage": "<div class=\"q-passage\">\n    AI image generators create images (A) <u>based on / opposite to</u> our text requests. They do this by copying other images that were created by humans. The generators have the ability to (B) <u>analyze / paralyze</u> millions of images and their (C) <u>corresponding / contradicting</u> descriptions. This allows them to create works of art in a (D) <u>short / long</u> time based on the provided instructions.\n  </div>", "box": "", "choices": ["(A)based on (B)analyze (C)corresponding (D)short", "(A)opposite to (B)analyze (C)corresponding (D)short", "(A)based on (B)paralyze (C)contradicting (D)short", "(A)based on (B)analyze (C)corresponding (D)long", "(A)opposite to (B)paralyze (C)contradicting (D)long"], "a": 0, "isWriting": false, "writingAns": "", "ansText": "① based on / analyze / corresponding / short", "detail": "📌 4개 빈칸 짝 단어 의미 비교▸(A) based on / opposite to•based on=~에 기반하여✓ (요청에 기반)•opposite to=~의 반대로✗ (요청에 반대로 만들면 의미 안 맞음)▸(B) analyze / paralyze•analyze=분석하다✓ (수백만 이미지를 분석)•paralyze=마비시키다✗ (의미 부적합)▸(C) corresponding / contradicting•corresponding=그에 상응하는, 일치하는✓ (이미지에 상응하는 설명)•contradicting=모순되는, 반박하는✗ (정반대 "}, {"n": 11, "type": "vocab", "typeName": "어휘", "typeColor": "#D97A47", "pts": 3, "focus": "SIGNATURE⭐ 시그니처: 영영풀이 부적절", "prompt": "<div class=\"q-prompt\"><b>11.</b> 다음 글의 밑줄 친 단어의 영영풀이로 가장 적절하지 <b>않은</b> 것은?</div>", "passage": "<div class=\"q-passage\">\n    Recently, an artist used an artificial intelligence (AI) system to create the image above for an art ① <u>contest</u>. The image won first place in the digital arts ② <u>category</u>. This led to a ③ <u>controversy</u> in the art community. Some people complained that the artist simply provided the system with basic ④ <u>instructions</u>. However, there were also people who were excited by the ⑤ <u>potential</u> of AI.\n  </div>", "box": "", "choices": ["contest: a competition in which people try to win a prize", "category: a group of things that share similar features", "controversy:complete agreement among all people on an issue", "instructions: information that tells you how to do something", "potential: the possibility for something to develop or be successful"], "a": 2, "isWriting": false, "writingAns": "", "ansText": "③ controversy 영영풀이 부적절", "detail": "📌 5개 영영풀이 한국어 해석 + 분석①contest: \"a competition in which people try to win a prize\"→ \"사람들이 상을 타려고 시도하는 경쟁\" =대회, 경연✓ 정확②category: \"a group of things that share similar features\"→ \"비슷한 특징을 공유하는 것들의 그룹\" =범주, 부문✓ 정확③controversy: \"complete agreement among all people on an issue\"→ \"어떤 사안에 대해 모든 사람들 사이의 완전한 "}, {"n": 12, "type": "vocab", "typeName": "어휘", "typeColor": "#D97A47", "pts": 3, "focus": "한 단어 정반대 함정", "prompt": "<div class=\"q-prompt\"><b>12.</b> 다음 글의 흐름상 밑줄 친 부분 중 어휘가 부적절한 것은?</div>", "passage": "<div class=\"q-passage\">\n    AI image generators create images based on our text requests. They do this by copying other images that were created by humans. The generators have the ability to ① <u>analyze</u> millions of images and their corresponding descriptions. This allows them to create works of art in a short time based on the provided instructions. Moreover, AI programs can ② <u>mix</u> the styles of existing images upon request. For example, you can blend a photograph of a cat with Vermeer's painting. These two images have a few ③ <u>similarities</u>. However, the overall design, the eyes, and the scarf around the head are clearly ④ <u>based on</u> Vermeer's painting. A ⑤ <u>simple</u> request was enough to create this complex and detailed image.\n  </div>", "box": "", "choices": ["analyze", "mix", "similarities", "based on", "simple"], "a": 2, "isWriting": false, "writingAns": "", "ansText": "③ similarities → differences", "detail": "📌 본문 흐름 분석본문 두 단락:• 1단락 — AI가 이미지를 분석·생성·혼합 ① ② ✓• 2단락 — 고양이 사진 + 베르메르 작품 혼합 사례▸ 두 이미지를 혼합한 결과 → 두 원본 사이엔차이점이 있어야 자연스러움▸ 그러나 결과물은 베르메르 작품에 기반(④) → 결국 차이는 있지만 전체적으로 베르메르 닮음📌 5개 밑줄 분석①analyze(분석하다) — 본문 흐름 일치 ✓②mix(혼합하다) — \"mix the styles\" 자연스러움 ✓③similarities (유사점)✗정반대 함정!본문 원본은\"These two images have"}, {"n": 13, "type": "vocab", "typeName": "어휘", "typeColor": "#D97A47", "pts": 3, "focus": "동의어 매칭", "prompt": "<div class=\"q-prompt\"><b>13.</b> 다음 본문 단어들과 의미가 가장 가까운 단어를 짝지은 것 중 적절하지 <b>않은</b> 것은?</div>", "passage": "<div class=\"q-passage\">\n    Recently, an artist used an AI system to create the image. The image won first place. This led to a ① <u>controversy</u> in the art community. AI generators can ② <u>analyze</u> millions of images and ③ <u>blend</u> styles. The result was a ④ <u>complex</u> and ⑤ <u>detailed</u> image.\n  </div>", "box": "", "choices": ["controversy≈dispute(논쟁, 분쟁)", "analyze≈examine(검토하다, 조사하다)", "blend≈separate(분리하다)", "complex≈complicated(복잡한)", "detailed≈thorough(철저한, 상세한)"], "a": 2, "isWriting": false, "writingAns": "", "ansText": "③ blend ≈ separate (반의어 — 함정)", "detail": "📌 5개 짝 단어 분석①controversy(논란) ≈dispute(논쟁) ✓ 동의어▸ 동의어 그룹:controversy = dispute = debate = argument②analyze(분석하다) ≈examine(검토하다) ✓ 동의어▸ 동의어 그룹:analyze = examine = inspect = study③blend(혼합하다) ≈separate(분리하다) ✗반의어 함정!정답▸ blend의 정확한 동의어:mix · combine · merge · fuse▸ separate는정반대의미 — 본문 *\"mix the styles\"*"}, {"n": 14, "type": "cloze", "typeName": "빈칸", "typeColor": "#B8763D", "pts": 5, "focus": "SIGNATURE⭐ 다양한 결론 빈칸 (3종)", "prompt": "<div class=\"q-prompt\"><b>14.</b> 본문의 (A), (B), (C) 각 결론에 들어갈 말로 가장 적절한 것을 고르시오.</div>", "passage": "<div class=\"q-passage\">[본문 동일 — AI 이미지 생성 + 베르메르 사례]</div>", "box": "", "choices": ["(A) destroy · (B) using public funding", "(A) analyze and combine · (B) copying classical music", "(A) ignore · (B) simple text instructions", "(A) hide · (B) government regulations", "(A) monitor · (B) random selection", "fixed forever", "increasingly blurred", "completely separated", "strictly enforced", "legally banned"], "a": 1, "isWriting": false, "writingAns": "", "ansText": "(A) ② analyze and combine · (B) ③ simple text instructions · (C) ② increasingly blurred", "detail": "📌 (A) 능력 측면 — analyze and combine결론문: \"AI 이미지 생성기는 기존 시각 콘텐츠를 ____하고 새 작품을 빠르게 만드는 능력을 보여준다\"① destroy (파괴) ✗②analyze and combine (분석하고 결합)✓ — 본문 *\"analyze millions of images\"* + *\"mix the styles\"* 직접 단서③ ignore (무시) ✗④ hide (숨기다) ✗⑤ monitor (감시) ✗📌 (B) 논란 측면 — simple text instructions결론문: \"미술계가 분열된 "}, {"n": 15, "type": "cloze", "typeName": "빈칸", "typeColor": "#B8763D", "pts": 3, "focus": "단일 결론 빈칸 — 핵심 한 단어", "prompt": "<div class=\"q-prompt\"><b>15.</b> 다음 글의 빈칸에 들어갈 말로 가장 적절한 것은?</div>", "passage": "<div class=\"q-passage\">\n    AI image generators have the ability to analyze millions of images and their corresponding descriptions. This vast database of human-created art provides them with patterns and styles. Then, when given a text request, they can <span class=\"q-blank\">______</span> these patterns to produce entirely new visual works in a short time.\n  </div>", "box": "", "choices": ["destroy", "recombine", "memorize", "translate", "delete"], "a": 1, "isWriting": false, "writingAns": "", "ansText": "② recombine (재결합하다)", "detail": "📌 본문 해석: AI 이미지 생성기는 수백만 개의 이미지와 그에 상응하는 설명을 분석할 능력이 있다. 인간이 창작한 예술의 이 방대한 데이터베이스는 그들에게 패턴과 스타일을 제공한다. 그러면, 텍스트 요청이 주어지면, 그들은 이러한 패턴을 ____해 완전히 새로운 시각 작품을 짧은 시간에 생산할 수 있다.📌 5개 선지 한국어 의미 + 분석①destroy=파괴하다— 본문 흐름과 정반대 ✗②recombine=재결합하다✓ 정답본문 *\"mix the styles\"*(스타일 혼합) + *\"copying other images\"*(다른 이미지"}, {"n": 16, "type": "cloze", "typeName": "빈칸", "typeColor": "#B8763D", "pts": 3, "focus": "결론 한 줄 빈칸", "prompt": "<div class=\"q-prompt\"><b>16.</b> 다음 글의 빈칸에 들어갈 말로 가장 적절한 것은?</div>", "passage": "<div class=\"q-passage\">\n    The recent victory of an AI-generated image at an art contest has divided the art community. Critics argue that providing simple instructions to a machine cannot equal years of practiced skill, while supporters point to the genuine creative potential of these tools. The debate ultimately centers on a single question: <span class=\"q-blank\">______</span>.\n  </div>", "box": "", "choices": ["whether the speed of AI matters more than its output quality", "whether AI itself can be considered a true creator of art", "whether digital art contests should accept handmade entries", "whether art critics need formal training in technology", "whether AI software should be free for all artists"], "a": 1, "isWriting": false, "writingAns": "", "ansText": "② AI 자체가 진정한 예술 창작자가 될 수 있는지", "detail": "📌 본문 핵심 흐름① 사실: AI가 미술 대회 1등 → 미술계 분열② 비평가 입장: 단순 지시 ≠ 숙련된 기술③ 지지자 입장: AI의 창의적 잠재력④결론 빈칸: 두 입장의 핵심 쟁점두 입장이 충돌하는 핵심은\"AI가 진정한 창작자인가?\"— 단순 지시(비평가) vs 창의적 잠재력(지지자) 모두 이 질문으로 수렴.📌 5개 선지 한국어 해석①whether the speed of AI matters more than its output quality→ \"AI의 속도가 출력 품질보다 더 중요한지\" — 본문 무관 ✗②whether AI itse"}, {"n": 17, "type": "cloze", "typeName": "빈칸", "typeColor": "#B8763D", "pts": 3, "focus": "5곳 빈칸 — 들어갈 수 없는 단어", "prompt": "<div class=\"q-prompt\"><b>17.</b> 다음 글의 흐름에 맞게 빈칸 (A)~(E)를 채울 때, 들어갈 수 <b>없는</b> 단어는?</div>", "passage": "<div class=\"q-passage\">\n    AI image generators are powerful tools, but they raise important (A) <span class=\"q-blank\">__</span> about authorship. Since they (B) <span class=\"q-blank\">__</span> human-created images to learn, the line between original work and (C) <span class=\"q-blank\">__</span> becomes blurred. Some artists feel their work is being used without permission, while others embrace the (D) <span class=\"q-blank\">__</span> for new creative possibilities. The future will likely require new (E) <span class=\"q-blank\">__</span> to balance both perspectives.\n  </div>", "box": "", "choices": ["questions", "copy", "imitation", "destruction", "rules"], "a": 3, "isWriting": false, "writingAns": "", "ansText": "④ destruction (안 들어감)", "detail": "📌 본문 해석: AI 이미지 생성기는 강력한 도구이지만 저작권에 대한 중요한 (A)____를 일으킨다. 그들이 인간이 창작한 이미지를 학습 위해 (B)____하기 때문에, 원작과 (C)____ 사이의 경계가 모호해진다. 일부 예술가들은 자신의 작품이 허락 없이 사용된다고 느끼며, 다른 이들은 새로운 창작 가능성에 대한 (D)____를 환영한다. 미래는 두 관점 사이의 균형을 위한 새로운 (E)____를 요구할 가능성이 크다.📌 5개 빈칸 분석(A) \"중요한 ___을 일으킨다\" →questions(질문/문제) ✓(B) \"인간 창작 이"}, {"n": 18, "type": "cloze", "typeName": "빈칸", "typeColor": "#B8763D", "pts": 3, "focus": "paraphrase 결론 빈칸", "prompt": "<div class=\"q-prompt\"><b>18.</b> 다음 글의 빈칸에 들어갈 말로 가장 적절한 것은?</div>", "passage": "<div class=\"q-passage\">\n    Many people initially viewed AI art as a threat to traditional artists. Yet, examining the technology reveals that AI does not invent images from nothing — it relies entirely on human-created visual content as its training material. Without millions of photographs and paintings made by people, no AI generator could function. In short, AI does not replace human creativity; instead, it <span class=\"q-blank\">______</span>.\n  </div>", "box": "", "choices": ["operates completely independently of human input", "builds upon and depends on the work of human artists", "generates random images without any reference", "destroys the value of all human-made artworks", "limits its output to one specific art style"], "a": 1, "isWriting": false, "writingAns": "", "ansText": "② builds upon and depends on the work of human artists", "detail": "📌 본문 핵심 흐름① 통념: AI 미술이 전통 예술가에게 위협 (initially viewed as threat)② 사실: AI는 무에서 창조 X — 인간 창작물에전적으로의존③ 결론 (빈칸): AI는 인간 창의성을 대체하지 않고, 대신 ____본문 핵심 표현:\"relies entirely on human-created visual content\"(인간 창작물에 전적 의존) → 결론은\"인간 작업 위에 세워지고 의존\"📌 5개 선지 한국어 해석①operates completely independently of human input→ \"인"}, {"n": 19, "type": "struct", "typeName": "글구조", "typeColor": "#8B4A6F", "pts": 3, "focus": "순서 배열 (A)(B)(C)", "prompt": "<div class=\"q-prompt\"><b>19.</b> 주어진 글 다음에 이어질 글의 순서로 가장 적절한 것은?</div>", "passage": "<div class=\"q-passage\">\n    Recently, an artist used an AI system to create an image that won first place in the digital arts category of an art contest.<br/><br/>\n    (A) However, there were also people who were excited by the potential of AI. Today, there are numerous AI programs that can create various forms of art including images, songs, and novels.<br/>\n    (B) This led to a controversy in the art community.<br/>\n    (C) Some people complained that the artist simply provided the system with basic instructions and let it do all the work. They felt this wasn't fair to the rest of the artists in the contest.\n  </div>", "box": "", "choices": ["(A)-(B)-(C)", "(A)-(C)-(B)", "(B)-(A)-(C)", "(B)-(C)-(A)", "(C)-(B)-(A)"], "a": 3, "isWriting": false, "writingAns": "", "ansText": "④ (B)-(C)-(A)", "detail": "📌 단락 흐름 추적주어진 글: AI가 만든 이미지가 1등 차지 (사건)▸(B) 첫 번째— \"This led to a controversy\"\"This\"(이것)는 1등 사건을 받음. → 사건의 첫 결과(논란)▸(C) 두 번째— \"Some people complained...\"논란의첫 입장제시 — 부정적 입장 (불공평)▸(A) 세 번째— \"However, there were also people who were excited...\"\"However\"(그러나) +\"also people who...\"→ (C)의 부정적 입장과대조되는 다른 입장"}, {"n": 20, "type": "struct", "typeName": "글구조", "typeColor": "#8B4A6F", "pts": 3, "focus": "문장 삽입", "prompt": "<div class=\"q-prompt\"><b>20.</b> 글의 흐름으로 보아, 주어진 문장이 들어가기에 가장 적절한 곳은?</div>", "passage": "<div class=\"q-passage\">\n<b>[ 주어진 문장 ]</b> For example, you can blend a photograph of a cat with Johannes Vermeer's <i>Girl with a Pearl Earring</i>.<br/><br/>\n    AI image generators create images based on our text requests. They do this by copying other images that were created by humans. ( ① ) The generators have the ability to analyze millions of images and their corresponding descriptions. ( ② ) This allows them to create works of art in a short time based on the provided instructions. ( ③ ) Moreover, AI programs can mix the styles of existing images upon request. ( ④ ) These two images have a few differences. ( ⑤ ) However, the overall design, the eyes, and the scarf around the head are clearly based on Vermeer's painting.\n  </div>", "box": "", "choices": ["", "", "", "", ""], "a": 3, "isWriting": false, "writingAns": "", "ansText": "④", "detail": "주어진 문장 해석: \"예를 들어, 고양이 사진을 베르메르의진주 귀걸이를 한 소녀와 혼합할 수 있다.\"📌 두 가지 단서로 ④번 자리 결정▸단서 1: \"For example\" (예시 도입)주어진 문장은구체 예시. 앞에는일반론이 있어야 함.④번 앞 문장:\"AI programs can mix the styles of existing images upon request\"(AI가 기존 이미지 스타일을 혼합 가능)→ 일반론. 뒤에 구체 예시(고양이 + 베르메르 혼합)가 자연스러움.▸단서 2: \"These two images\" 지시어④번 뒤 문장"}, {"n": 21, "type": "struct", "typeName": "글구조", "typeColor": "#8B4A6F", "pts": 3, "focus": "어색한 문장 식별", "prompt": "<div class=\"q-prompt\"><b>21.</b> 다음 글의 흐름상 어색한 문장은?</div>", "passage": "<div class=\"q-passage\">\n    AI image generators are remarkable tools for creating visual works. ① They analyze millions of images and their corresponding descriptions to learn artistic patterns. ② Based on a user's text request, they can produce new artworks within seconds. ③ The cost of AI development has decreased significantly over the past decade. ④ Moreover, they can blend the styles of multiple existing images upon request, producing unique combinations. ⑤ Even a brief instruction can result in a complex and detailed final image.\n  </div>", "box": "", "choices": ["", "", "", "", ""], "a": 2, "isWriting": false, "writingAns": "", "ansText": "③", "detail": "📌 본문 흐름 분석주제: AI 이미지 생성기의능력·작동 방식설명① 분석 능력 (이미지·설명 분석) ✓② 생성 능력 (텍스트 요청 → 새 작품) ✓③\"AI 개발 비용 감소\" — 흐름상 이질적 ✗ 정답본문은 AI의능력·작동 방식을 다루는데, ③은 갑자기경제적 측면(비용 감소) 진술. 주제와 맞지 않음④ 혼합 능력 (Moreover로 추가) ✓⑤ 결과의 풍부함 (간단한 지시 → 복잡한 결과) ✓📌 어색한 문장 식별 핵심본문이 일관된주제·관점으로 진행되는데, 갑자기 다른 주제로 빠지는 문장이 어색한 문장.📌 흐름 단서 활용▸ 연결어 추적:"}, {"n": 22, "type": "pronoun", "typeName": "대명사·지칭", "typeColor": "#6B5BA0", "pts": 2, "focus": "SIGNATURE⭐ 시그니처: 두 명사 미끼", "prompt": "<div class=\"q-prompt\"><b>22.</b> 다음 글에 대한 설명으로 적절하지 <b>않은</b> 것은?</div>", "passage": "<div class=\"q-passage\">\n    AI image generators create ⓐ <u>images</u> based on our text requests. They do this by copying ⓑ <u>other images</u> that were created by humans. The generators have the ability to analyze millions of ⓒ <u>images and their corresponding descriptions</u>. ⓓ <i>This</i> allows them to create works of art in a short time based on the provided instructions.\n  </div>", "box": "", "choices": ["ⓐ는 AI가 생성하는 결과물을 가리킨다.", "ⓑ는 인간이 만든 기존 이미지를 가리킨다.", "ⓒ에서their는millions of images를 가리킨다.", "ⓓThis는\"text requests\"를 가리킨다.", "본문 핵심은 AI가 텍스트 지시에 기반해 빠르게 작품을 만드는 능력이다."], "a": 3, "isWriting": false, "writingAns": "", "ansText": "④ ⓓ This = \"text requests\" (부적절)", "detail": "📌 5개 선지 분석① ⓐ images = AI가 생성하는 결과물 ✓② ⓑ other images = 인간이 만든 기존 이미지 ✓ (본문 *\"other images that were created by humans\"*)③ ⓒ their = millions of images ✓ (수백만 이미지의 설명들)④ⓓ This = \"text requests\" ✗ 정답실제 ⓓThis가 가리키는 것은앞 문장 전체 — \"분석 능력(the ability to analyze millions of images and their corresponding de"}, {"n": 23, "type": "pronoun", "typeName": "대명사·지칭", "typeColor": "#6B5BA0", "pts": 2, "focus": "them 지칭 — 가까운 명사 + 의미 검증", "prompt": "<div class=\"q-prompt\"><b>23.</b> 다음 글의 밑줄 친 <i>them</i>이 가리키는 것으로 가장 적절한 것은?</div>", "passage": "<div class=\"q-passage\">\n    AI image generators have the ability to analyze <b>millions of images</b> and their <b>corresponding descriptions</b>. This vast database allows the systems to understand artistic patterns. The generators then use <i>them</i> to produce new artworks that respond accurately to user requests.\n  </div>", "box": "", "choices": ["AI image generators", "millions of images", "corresponding descriptions", "artistic patterns", "user requests"], "a": 3, "isWriting": false, "writingAns": "", "ansText": "④ artistic patterns", "detail": "📌 본문 해석: AI 이미지 생성기는 수백만 개의 이미지와 그에 상응하는 설명을 분석할 능력이 있다. 이 방대한 데이터베이스는 시스템이예술적 패턴을 이해하도록 한다. 그러면 생성기는 사용자 요청에 정확히 응답하는 새 작품을 만들기 위해그것들을 사용한다.📌 두 명사 미끼 구조 분석본문에 4개 복수 명사구가 등장 (them이 받을 후보):① millions of images② corresponding descriptions③ artistic patterns④ user requests📌 의미 검증으로 정답 판별문장: \"The genera"}, {"n": 24, "type": "pronoun", "typeName": "대명사·지칭", "typeColor": "#6B5BA0", "pts": 2, "focus": "it 지칭 — 단수 + 추상 개념", "prompt": "<div class=\"q-prompt\"><b>24.</b> 다음 글의 밑줄 친 <i>it</i>이 가리키는 것으로 가장 적절한 것은?</div>", "passage": "<div class=\"q-passage\">\n    Recently, an artist used an AI system to create the image above for an art contest. <b>The image</b> won first place in the digital arts category. This led to <b>a controversy</b> in the art community. Some critics argued that <i>it</i> would not be easily resolved without clearer rules from the contest organizers.\n  </div>", "box": "", "choices": ["the artist", "the AI system", "the image", "a controversy", "the art community"], "a": 3, "isWriting": false, "writingAns": "", "ansText": "④ a controversy", "detail": "📌 본문 해석: 최근 한 예술가가 AI 시스템을 사용해 미술 대회를 위해 위 이미지를 창작했다. 그 이미지는 디지털 아트 부문에서 1등을 차지했다. 이는 미술계에 논란을 일으켰다. 일부 비평가들은그것이 대회 주최 측의 명확한 규칙 없이는 쉽게 해결되지 않을 것이라고 주장했다.📌 1단계 — 단수/복수 일치it = 단수 → 단수 후보만 남김① the artist (단수) — 후보 가능② the AI system (단수) — 후보 가능③ the image (단수) — 후보 가능④ a controversy (단수) — 후보 가능⑤ the "}, {"n": 25, "type": "pronoun", "typeName": "대명사·지칭", "typeColor": "#6B5BA0", "pts": 3, "focus": "these 지칭 — 복수 지시어", "prompt": "<div class=\"q-prompt\"><b>25.</b> 다음 글의 밑줄 친 <i>these</i>가 가리키는 것으로 가장 적절한 것은?</div>", "passage": "<div class=\"q-passage\">\n    Today, there are numerous AI programs that can create various forms of art including <b>images, songs, and novels</b>. These programs operate at remarkable speeds and require minimal human input. Many people are excited by the potential, while others feel <i>these</i> may threaten the value of human-made art.\n  </div>", "box": "", "choices": ["numerous AI programs", "various forms of art", "images, songs, and novels", "remarkable speeds", "many people"], "a": 0, "isWriting": false, "writingAns": "", "ansText": "① numerous AI programs", "detail": "📌 본문 해석: 오늘날 이미지·노래·소설을 포함한 다양한 형태의 예술을 만들 수 있는 수많은 AI 프로그램이 있다.이 프로그램들은 놀라운 속도로 작동하며 최소한의 인간 입력만 필요로 한다. 많은 사람들이 그 잠재력에 흥분하는 한편, 다른 이들은이것들이 인간 창작 예술의 가치를 위협할 수 있다고 느낀다.📌 1단계 — 복수 일치these = 복수 → 복수 후보만 남김 const now=new Date(),ds=now.getFullYear()+'.'+String(now.getMonth()+1).padStart(2,'0')+'.'+String(now.getDate()).padStart(2,'0');
const ci=2*Math.PI*68,pct=Math.round(ts/mMax*100);
let h=`<div class="rpt-hero"><div style="position:relative;z-index:1;margin-bottom:24px;"><div style="font-size:10px;color:#a8c4e8;font-weight:600;letter-spacing:2px;margin-bottom:6px;">신목고 AI Part 1</div><div style="font-family:'Playfair Display',serif;font-size:22px;color:#fff;">${nm} 학생 성적 분석</div><div style="font-size:11px;color:#6a8ab8;">${ds} · ${sch||''} · 목동서로 영어학원</div></div><div class="rpt-row"><div class="rpt-circle"><svg width="160" height="160" viewBox="0 0 160 160"><circle class="rc-bg" cx="80" cy="80" r="68"/><circle class="rc-fill" cx="80" cy="80" r="68" stroke="${pct>=80?'#6a0dad':pct>=60?'#1a7a4a':'#c0392b'}" stroke-dasharray="${ci}" stroke-dashoffset="${ci*(1-ts/mMax)}"/></svg><div class="rpt-cc"><div class="rn">${ts}</div><div class="ru">/ ${mMax}점</div></div></div><div style="color:#fff;"><div style="font-family:'Playfair Display',serif;font-size:34px;color:var(--gold);font-weight:700;">${pct}%</div><div style="font-size:13px;color:#c8d8f0;">객관식 ${tc}/${mQ.length}문항</div></div></div></div>`;
h+=`<div class="card"><h2>📊 유형별 정답률</h2>`;Object.entries(tS).forEach(([k,v])=>{const p=v.t?Math.round(v.c/v.t*100):0;h+=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;"><div style="width:90px;font-size:12px;font-weight:700;color:${v.color};">${k}</div><div style="flex:1;"><div class="sb-bar"><div class="sb-fill" style="width:${p}%;background:${v.color};"></div></div></div><div style="width:60px;text-align:right;font-size:12px;font-weight:700;color:${v.color};">${v.c}/${v.t} ${p>=70?'✅':p>=40?'⚠️':'❗'}</div></div>`;});h+=`</div>`;

// 전체 문제 리뷰
h+=`<div class="card"><h2>\u{1F4D6} 전체 문제 리뷰</h2><div class="sub">맞은 문제 ○ · 틀린 문제 ✗ · 서술형 ✍</div>`;
const rlb=['①','②','③','④','⑤'];
Q.forEach(q=>{
  const ua=answers[q.n];
  let ok=false,si='',sc='';
  if(q.isWriting){si='✍';sc='#1F4E79';}else{ok=ua===q.a;si=ok?'○':'✗';sc=ok?'var(--green)':'var(--red)';}
  h+=`<div style="border:1.5px solid ${q.isWriting?'#7aaee8':ok?'#c8e8cc':'#f0b0b0'};border-radius:10px;padding:14px 18px;margin-bottom:8px;background:${q.isWriting?'#f8fbff':ok?'#fcfefb':'#fffbfb'};">`;
  h+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;"><span style="font-size:18px;font-weight:800;color:${sc};">${si}</span><span style="background:var(--navy);color:#fff;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;">${q.n}번</span><span style="padding:2px 6px;border-radius:3px;font-size:9px;font-weight:700;color:#fff;background:${q.typeColor};">${q.typeName}</span><span style="font-size:10px;color:var(--muted);">${q.pts}점</span></div>`;
  h+=`<div style="font-size:13px;color:#333;line-height:1.6;margin-bottom:6px;">${q.prompt}</div>`;
  if(q.passage)h+=`<div style="background:#f5f5f0;border:1px solid #e5dfd5;border-radius:6px;padding:8px 12px;margin-bottom:6px;font-size:12.5px;line-height:1.65;color:#444;max-height:120px;overflow-y:auto;">${q.passage}</div>`;
  if(q.isWriting){
    h+=`<div style="background:#e8f5e9;border:1px solid #1a7a4a;border-radius:6px;padding:8px 12px;font-size:12.5px;color:#1a7a4a;">✓ 모범답안: ${q.writingAns||q.ansText}</div>`;
  }else if(q.choices&&q.choices.length>0){
    q.choices.forEach((c,i)=>{
      const isC=i===q.a,isM=i===ua,isW=isM&&!ok;
      let bg='#fff',bd='#eee',cl='#555',mk='';
      if(isC){bg='#e8f5e9';bd='#1a7a4a';cl='#1a7a4a';mk=' ✓ 정답';}
      if(isW){bg='#fde8e8';bd='#c0392b';cl='#c0392b';mk=' ✗ 내 답';}
      if(isM&&ok)mk=' ✓ 내 답';
      h+=`<div style="padding:5px 10px;border:1px solid ${bd};border-radius:5px;margin-bottom:2px;font-size:12px;color:${cl};background:${bg};display:flex;align-items:center;gap:6px;"><b>${rlb[i]}</b><span style="flex:1;">${c}</span>${mk?`<span style="font-size:10px;font-weight:700;">${mk}</span>`:''}</div>`;
    });
  }else{
    h+=`<div style="font-size:12px;color:${ok?'var(--green)':'var(--red)'};">내 답: ${ua!==undefined?rlb[ua]:'미응답'} · 정답: ${q.a>=0?rlb[q.a]:'-'}</div>`;
  }
  if(q.detail&&!ok&&!q.isWriting)h+=`<div style="background:#f8fafd;border-left:3px solid var(--gold);border-radius:0 6px 6px 0;padding:6px 10px;margin-top:6px;font-size:11.5px;color:#555;line-height:1.6;">💡 ${q.detail.substring(0,200)}</div>`;
  h+=`</div>`;
});
h+=`</div>`;

h+=`<div style="text-align:center;margin-top:16px;"><button class="btn btn-primary" onclick="window.print()" style="margin-right:8px;">🖨️ 인쇄</button><button class="btn btn-outline" onclick="location.reload()">🔄 다시 풀기</button></div>`;
h+=`<div class="rpt-ft"><b>목동서로 영어학원</b> · 신목고 AI Part 1 · ${ds}<br><a href="https://0505.co.kr" target="_blank" style="color:var(--gold);font-weight:700;text-decoration:none;">🌐 0505.co.kr</a></div>`;
document.getElementById('rc').innerHTML=h;document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));document.getElementById('step2').classList.add('active');window.scrollTo({top:0});
try{let hi=JSON.parse(localStorage.getItem(STORE_KEY)||'[]');hi.unshift({nm,sch,ds,score:ts,maxPts:mMax,correct:tc,pct});if(hi.length>30)hi=hi.slice(0,30);localStorage.setItem(STORE_KEY,JSON.stringify(hi));}catch(e){}}
const ADMIN_PW='1234';let adminOK=false;
function openAdmin(){document.getElementById('adminOv').classList.add('show');const pn=document.getElementById('adminPn');if(!adminOK)pn.innerHTML=`<h3>🔒 관리자</h3><div style="display:flex;gap:8px;"><input type="password" id="apw" placeholder="비밀번호" style="padding:8px 12px;border:2px solid var(--border);border-radius:8px;" onkeydown="if(event.key==='Enter')chkPw()"><button class="btn btn-primary" onclick="chkPw()" style="padding:8px 16px;">확인</button></div>`;else renderAdmin();}
function closeAdmin(){document.getElementById('adminOv').classList.remove('show');}
function chkPw(){if(document.getElementById('apw').value===ADMIN_PW){adminOK=true;renderAdmin();}else alert('비밀번호 오류');}
function renderAdmin(){const h2=JSON.parse(localStorage.getItem(STORE_KEY)||'[]');const pn=document.getElementById('adminPn');let html=`<div style="display:flex;justify-content:space-between;margin-bottom:14px;"><h3>기록 (${h2.length}건)</h3><button class="btn btn-outline" onclick="closeAdmin()" style="padding:6px 14px;font-size:12px;">닫기</button></div>`;if(!h2.length)html+='<p style="color:var(--muted);">기록 없음</p>';else{html+='<table class="ht"><tr><th>날짜</th><th>이름</th><th>점수</th><th>정답률</th><th></th></tr>';h2.forEach((r,i)=>{html+=`<tr><td>${r.ds}</td><td><b>${r.nm}</b></td><td>${r.score}/${r.maxPts}</td><td>${r.pct}%</td><td><button onclick="let h=JSON.parse(localStorage.getItem('shin_p1')||'[]');h.splice(${i},1);localStorage.setItem('shin_p1',JSON.stringify(h));renderAdmin();" style="background:var(--red);color:#fff;border:none;padding:3px 8px;border-radius:4px;font-size:10px;cursor:pointer;">삭제</button></td></tr>`;});html+='</table>';}pn.innerHTML=html;}
</script></body></html>
