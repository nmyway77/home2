<script>
/* ══ 요약문 데이터 (4버전 × 3빈칸 = 12) ══ */
const SUMMARIES=[
{id:'A',title:'Plain Summary',subtitle:'일반 독자 관점',
parts:[{t:"Speaking to 300 young children at a museum, the author let them "},{ans:"explore",n:24},{t:" a bag of prosthetic legs without adult supervision. Naturally curious rather than afraid, the kids shouted creative ideas — kangaroo, frog, even the ability to "},{ans:"fly",n:25},{t:". Their imagination "},{ans:"transformed",n:26},{t:" the author from \"disabled\" to \"super-abled.\""}],
koParts:[{t:"박물관에서 300명의 어린아이들에게 강연하면서, 저자는 어른 감독 없이 의족 한 가방을 "},{ans:"탐색하게",n:24},{t:" 했다. 무서워하기보다 자연스레 호기심을 가진 아이들은 캥거루, 개구리, 심지어 "},{ans:"날 수 있는",n:25},{t:" 능력 같은 창의적 아이디어를 외쳤다. 그들의 상상력은 저자를 '장애인'에서 '초능력자'로 "},{ans:"바꾸어 놓았다",n:26},{t:"."}],
explains:[
{n:24,word:"explore",ex:"<b>let + O + V원형</b>(사역동사). 박물관에서 아이들이 의족을 직접 살펴보도록 허락한다는 의미"},
{n:25,word:"fly",ex:"<b>the ability to V</b> = ~할 수 있는 능력. 본문 12행 \"why wouldn't you want to fly too?\"와 호응"},
{n:26,word:"transformed",ex:"<b>transform A from B to C</b> = A를 B에서 C로 바꾸다. 본문의 'went from disabled to super-abled' 핵심 표현"}
]},
{id:'B',title:'Research Lens',subtitle:'아동심리 관점',
parts:[{t:"Developmental psychology finds children are naturally "},{ans:"curious",n:27},{t:" about what is unfamiliar, and only learn fear when adults restrain their questioning. Removing adult "},{ans:"supervision",n:28},{t:", the author let the kids respond freely — and their answers revealed "},{ans:"potential",n:29},{t:" rather than limitation in her body."}],
koParts:[{t:"발달심리학은 아이들이 낯선 것에 대해 자연스레 "},{ans:"호기심을",n:27},{t:" 가지며, 어른들이 질문을 통제할 때에만 두려움을 배운다는 것을 보여준다. 어른의 "},{ans:"감독",n:28},{t:"을 제거하자 아이들의 답은 그녀 몸의 한계가 아니라 "},{ans:"잠재력을",n:29},{t:" 드러냈다."}],
explains:[
{n:27,word:"curious",ex:"<b>be curious about</b> = ~에 대해 호기심이 있다. 형용사 보어. 본문 S2 \"kids are naturally curious about what they don't know\""},
{n:28,word:"supervision",ex:"<b>adult supervision</b> = 어른의 감독/감시 (불가산명사). 본문 \"kids could come in without any adults\"의 핵심"},
{n:29,word:"potential",ex:"<b>potential</b> = 잠재력 (불가산명사). 본문 S14 \"somebody that had potential\"과 직결"}
]},
{id:'C',title:'Practical View',subtitle:'어른의 자세',
parts:[{t:"To preserve children's open minds, adults must "},{ans:"refrain",n:30},{t:" from policing their natural curiosity. Given freedom, kids do not judge — they "},{ans:"examine",n:31},{t:" what they see and imagine new possibilities. Their answers can "},{ans:"reshape",n:32},{t:" how we view disability itself."}],
koParts:[{t:"아이들의 열린 마음을 지키려면 어른들은 그들의 자연스러운 호기심을 단속하기를 "},{ans:"삼가야",n:30},{t:" 한다. 자유가 주어지면 아이들은 판단하지 않고 보이는 것을 "},{ans:"살펴보며",n:31},{t:", 새로운 가능성을 상상한다. 그들의 대답은 우리가 장애 자체를 보는 방식을 "},{ans:"재구성할",n:32},{t:" 수 있다."}],
explains:[
{n:30,word:"refrain",ex:"<b>refrain from V-ing</b> = ~하기를 삼가다 (자제하다). 본문 S3의 'censors / reins in'(억제하다)와 호응"},
{n:31,word:"examine",ex:"<b>examine</b> = 자세히 살펴보다, 조사하다. 본문 S8의 'poking and prodding'(만지고 찔러보다)의 추상 동사화"},
{n:32,word:"reshape",ex:"<b>reshape</b> = 재구성하다, 모양을 바꾸다. how절을 목적어로 (의문사절). 본문 결론 'transformed'와 동의어"}
]},

/* ══ 펜 필기 모드 (자유 필기) v1.0 ══ */
const PEN_COLORS=['#dc2626','#1F3864','#0f9d58','#f59e0b','#000000'];
const PEN_WIDTHS=[2,4,7];
let penEnabled=false,penColor='#dc2626',penWidth=4,penEraser=false;
let penLayer=null,penPath=null,penPts=[];

function buildPenTools(){
  if(document.getElementById('penLayer'))return;
  penLayer=document.createElementNS('http://www.w3.org/2000/svg','svg');
  penLayer.id='penLayer';
  document.body.appendChild(penLayer);
  var tb=document.createElement('div');
  tb.id='penToolbar';
  var html='<button class="pen-btn pen-main" id="penToggle" title="펜 ON/OFF">✏️</button><div class="pen-tools" id="penTools">';
  PEN_COLORS.forEach(function(c){html+='<button class="pen-color" data-color="'+c+'" style="background:'+c+';" title="색상"></button>'});
  PEN_WIDTHS.forEach(function(w){html+='<button class="pen-width" data-width="'+w+'" title="굵기"><span style="width:'+(w*2)+'px;height:'+(w*2)+'px;"></span></button>'});
  html+='<button class="pen-btn pen-eraser" id="penEraserBtn" title="개별 지우개">🧹</button><button class="pen-btn pen-clear" id="penClearBtn" title="전체 지우기">🗑️</button></div>';
  tb.innerHTML=html;
  document.body.appendChild(tb);
  document.querySelector('.pen-color[data-color="'+penColor+'"]').classList.add('selected');
  document.querySelector('.pen-width[data-width="'+penWidth+'"]').classList.add('selected');
  document.getElementById('penToggle').addEventListener('click',togglePen);
  document.querySelectorAll('.pen-color').forEach(function(b){b.addEventListener('click',function(e){
    var c=e.currentTarget.dataset.color;
    penColor=c;penEraser=false;
    document.querySelectorAll('.pen-color').forEach(function(x){x.classList.toggle('selected',x.dataset.color===c)});
    document.getElementById('penEraserBtn').classList.remove('active');
  })});
  document.querySelectorAll('.pen-width').forEach(function(b){b.addEventListener('click',function(e){
    var w=+e.currentTarget.dataset.width;
    penWidth=w;
    document.querySelectorAll('.pen-width').forEach(function(x){x.classList.toggle('selected',+x.dataset.width===w)});
  })});
  document.getElementById('penEraserBtn').addEventListener('click',function(){
    penEraser=!penEraser;
    document.getElementById('penEraserBtn').classList.toggle('active',penEraser);
  });
  document.getElementById('penClearBtn').addEventListener('click',function(){
    if(confirm('모든 필기를 지우시겠습니까?'))penLayer.innerHTML='';
  });
  penLayer.addEventListener('pointerdown',penDown);
  penLayer.addEventListener('pointermove',penMove);
  penLayer.addEventListener('pointerup',penUp);
  penLayer.addEventListener('pointercancel',penUp);
  penLayer.addEventListener('pointerleave',penUp);
  var sync=function(){
    var h=Math.max(document.body.scrollHeight,document.documentElement.scrollHeight);
    var w=Math.max(document.body.scrollWidth,document.documentElement.scrollWidth);
    penLayer.setAttribute('width',w);
    penLayer.setAttribute('height',h);
    penLayer.style.height=h+'px';
    penLayer.style.width=w+'px';
  };
  sync();
  if(window.ResizeObserver)new ResizeObserver(sync).observe(document.body);
  window.addEventListener('resize',sync);
  setInterval(sync,2000);
}
function togglePen(){
  penEnabled=!penEnabled;
  document.getElementById('penToggle').classList.toggle('active',penEnabled);
  document.getElementById('penTools').classList.toggle('show',penEnabled);
  penLayer.classList.toggle('active',penEnabled);
}
function getPenPt(e){
  return {x:e.clientX+window.scrollX,y:e.clientY+window.scrollY};
}
function penDown(e){
  if(!penEnabled)return;
  e.preventDefault();
  try{penLayer.setPointerCapture(e.pointerId);}catch(_){}
  if(penEraser){eraseAt(e);return;}
  var pt=getPenPt(e);
  penPath=document.createElementNS('http://www.w3.org/2000/svg','path');
  penPath.setAttribute('d','M '+pt.x+' '+pt.y);
  penPath.setAttribute('stroke',penColor);
  penPath.setAttribute('stroke-width',penWidth);
  penPath.setAttribute('fill','none');
  penPath.setAttribute('stroke-linecap','round');
  penPath.setAttribute('stroke-linejoin','round');
  penLayer.appendChild(penPath);
  penPts=[pt];
}
function penMove(e){
  if(!penEnabled)return;
  if(penEraser&&e.buttons){eraseAt(e);return;}
  if(!penPath)return;
  e.preventDefault();
  var pt=getPenPt(e);
  var last=penPts[penPts.length-1];
  if(Math.hypot(pt.x-last.x,pt.y-last.y)<1.5)return;
  penPts.push(pt);
  var d='M '+penPts[0].x+' '+penPts[0].y;
  for(var i=1;i<penPts.length-1;i++){
    var c=penPts[i],n=penPts[i+1];
    var mx=(c.x+n.x)/2,my=(c.y+n.y)/2;
    d+=' Q '+c.x+' '+c.y+' '+mx+' '+my;
  }
  if(penPts.length>=2){
    var lp=penPts[penPts.length-1];
    d+=' L '+lp.x+' '+lp.y;
  }
  penPath.setAttribute('d',d);
}
function penUp(e){
  if(penPath){penPath=null;penPts=[];}
}
function eraseAt(e){
  var pt=getPenPt(e);
  var r=20;
  var paths=Array.from(penLayer.querySelectorAll('path'));
  for(var i=0;i<paths.length;i++){
    var p=paths[i];
    var bb=p.getBBox();
    if(pt.x>=bb.x-r&&pt.x<=bb.x+bb.width+r&&pt.y>=bb.y-r&&pt.y<=bb.y+bb.height+r){
      p.remove();
    }
  }
}
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',buildPenTools);
}else{
  setTimeout(buildPenTools,100);
}
