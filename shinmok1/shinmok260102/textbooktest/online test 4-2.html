": "② Depending / which", "detail": "📌 (A) Depending — 분사구문주어AI programs가 의존하는주체→현재분사(-ing)▸Depending entirely on imperfect data= \"불완전한 데이터에 전적으로 의존하면서\"※ Depend(원형)는 부사구 시작 자리에 부적합※ Depended(과거분사)는 의존 받는 객체일 때 사용 — 여기선 부적합📌 (B) which — 계속적 용법구조:\"Human imagination, ___ has no such boundaries, easily surpasses these constraints\"▸ 본 절:Hum"}, {"n": 6, "type": "grammar", "typeName": "어법", "typeColor": "#1F4E79", "pts": 2, "focus": "시제·태·동명사", "prompt": "<div class=\"q-prompt\"><b>6.</b> 다음 글의 (A)·(B)·(C)에서 어법에 맞는 표현으로 가장 적절한 것은?</div>", "passage": "<div class=\"q-passage\">\n    Virtual influencers (A) <u>have already released / has already released</u> several songs. These types of virtual musicians are able (B) <u>to speak / speaking</u> and move realistically. What we need to do is figure out (C) <u>how to use / how using</u> AI tools ethically.\n  </div>", "box": "", "choices": ["(A)have already released (B)to speak (C)how to use", "(A)has already released (B)to speak (C)how to use", "(A)have already released (B)speaking (C)how using", "(A)has already released (B)speaking (C)how to use", "(A)have already released (B)to speak (C)how using"], "a": 0, "isWriting": false, "writingAns": "", "ansText": "① have already released / to speak / how to use", "detail": "📌 (A) have already released주어Virtual influencers(복수) →have(현재완료 복수형)▸ already(이미)와 함께 자주 쓰임 — 현재완료 시그널📌 (B) to speakbe able to + 동사원형= \"~할 수 있다\"▸ to speak and move 두 동사가 to부정사로 병렬※be able + speaking은 비문📌 (C) how to usehow to V= \"~하는 방법\" (명사구)▸ figure out how to use AI = \"AI 사용법을 알아내다\"※how + V-ing은 비"}, {"n": 7, "type": "reading", "typeName": "독해", "typeColor": "#2A8B7F", "pts": 3, "focus": "단락 일치 — 창작 사실 함정", "prompt": "<div class=\"q-prompt\"><b>7.</b> 다음 글의 내용과 일치하지 <b>않는</b> 것은?</div>", "passage": "<div class=\"q-passage\">[본문 — Example 2 + The Debate + Conclusion 전체]</div>", "box": "", "choices": ["AI 프로그램은 미술계뿐 아니라 음악 산업에도 변화를 가져올 수 있다.", "사용자는 곡의 스타일·조성·길이를 선택할 수 있다.", "가상 인플루언서 중 일부는 인간 가수처럼 SNS에 ox": "", "choices": ["인간의 상상력은 데이터에 의존하지 않으므로 AI보다 더 자유롭고 무한하다.", "인간은 AI보다 데이터를 더 많이 활용할 수 있어 결과가 우수하다.", "AI는 인간보다 빠르므로 결국 인간을 완전히 대체할 것이다.", "인간의 상상력은 시간과 공간의 제약 속에서만 작동한다.", "AI와 인간은 동일한 한계를 공유하므로 협력이 어렵다."], "a": 0, "isWriting": false, "writingAns": "", "ansText": "① 인간 상상력은 데이터 의존 없어 AI보다 자유·무한", "detail": "📌 본문 핵심 — 대조 구조앞 문장: AI는데이터 의존+다양성 부족→출력 한계밑줄:\"on the other hand\"(한편) = AI와 정반대→ 인간 상상력은한계·경계 없음📌 5개 선지 분석①\"데이터 의존 없어 자유롭고 무한\"✓ 정답AI(데이터 의존, 한계) vs 인간(데이터 의존 X, 무한) 대조 정확② \"데이터를 더 많이 활용\" — 본문 정반대 ✗③ \"AI 완전 대체\" — 본문 옹호 입장과 무관 ✗④ \"시간·공간 제약\" — 본문 정반대 (no limits) ✗⑤ \"동일 한계 공유\" — 본문 정반대 ✗📌 풀이 핵심 — 대조 구조 "}, {"n": 10, "type": "vocab", "typeName": "어휘", "typeColor": "#D97A47", "pts": 3, "focus": "SIGNATURE⭐ 시그니처: (A)~(D) 짝짓기", "prompt": "<div class=\"q-prompt\"><b>10.</b> 다음 글의 (A)·(B)·(C)·(D)에서 문맥에 맞는 표현으로 가장 적절한 것은?</div>", "passage": "<div class=\"q-passage\">\n    Many AI programs are open to the public, which means they can be used (A) <u>freely / strictly</u>. However, these programs have sparked a debate over their (B) <u>impact / contact</u> on humans. Since AI has the potential to perform skills better than humans, some view it as a (C) <u>threat / treat</u>. They worry that AI will (D) <u>replace / restore</u> humans in more and more areas.\n  </div>", "box": "", "choices": ["(A)freely (B)impact (C)threat (D)replace", "(A)strictly (B)impact (C)threat (D)replace", "(A)freely (B)contact (C)treat (D)restore", "(A)freely (B)impact (C)treat (D)replace", "(A)strictly (B)contact (C)threat (D)restore"], "a": 0, "isWriting": false, "writingAns": "", "ansText": "① freely / impact / threat / replace", "detail": "📌 4개 빈칸 짝 단어 비교▸ (A)freely(자유롭게) ↔strictly(엄격하게) — open to the public 흐름상 freely ✓▸ (B)impact(영향) ↔contact(접촉) — debate over impact = 영향에 대한 논쟁※ 발음 유사 함정 — 한 글자 차이▸ (C)threat(위협) ↔treat(대접) — AI를 위협으로 봄※ 한 글자(h) 차이 발음 유사▸ (D)replace(대체) ↔restore(복원) — 인간 대체※ re- 접두사 공유로 발음 유사📌 ⭐ 신목고 Q4 시그니처 — 4곳 동시 "}, {"n": 11, "type": "vocab", "typeName": "어휘", "typeColor": "#D97A47", "pts": 3, "focus": "SIGNATURE⭐ 시그니처: 영영풀이 부적절", "prompt": "<div class=\"q-prompt\"><b>11.</b> 다음 본문 단어들의 영영풀이로 가장 적절하지 <b>않은</b> 것은?</div>", "passage": "", "box": "", "choices": ["compose: to write or create music or poetry", "realistic: appearing similar to real life or actual things", "consent:strong refusal or rejection", "imitate: to copy the way something looks, sounds, or behaves", "collaborate: to work together with another person or group"], "a": 2, "isWriting": false, "writingAns": "", "ansText": "③ consent — 정반대 의미", "detail": "📌 5개 영영풀이 한국어 해석①compose: \"음악·시를 쓰거나 창작하다\" = 작곡·작시 ✓②realistic: \"실제 삶이나 사물과 비슷하게 보이는\" = 사실적인 ✓③consent: \"strong refusal or rejection\" = \"강한 거부나 거절\" ✗정답 (정반대!)실제 의미:동의, 승낙. 본문 *\"without their consent\"*(동의 없이)와 정반대▸ 정확한 영영풀이:\"agreement or permission for something to happen\"④imitate: \"어떤 것의 모습·소리·행동을 따"}, {"n": 12, "type": "vocab", "typeName": "어휘", "typeColor": "#D97A47", "pts": 3, "focus": "한 단어 정반대 함정", "prompt": "<div class=\"q-prompt\"><b>12.</b> 다음 글의 흐름상 밑줄 친 부분 중 어휘가 부적절한 것은?</div>", "passage": "<div class=\"q-passage\">\n    Many AI programs are ① <u>open</u> to the public, meaning they can be used freely. However, these programs have sparked a debate. Some view AI as a threat because it has the potential to perform skills ② <u>better</u> than humans. There are concerns that AI may imitate the styles of human artists ③ <u>with</u> their consent. On the other hand, others think AI is still ④ <u>dependent</u> on human assistance. AI's data can have ⑤ <u>flaws</u> or limitations.\n  </div>", "box": "", "choices": ["open", "better", "with", "dependent", "flaws"], "a": 2, "isWriting": false, "writingAns": "", "ansText": "③ with → without", "detail": "📌 본문 흐름 분석① 많은 AI 프로그램 공개 ✓② 인간보다 더 잘 수행할 잠재력 ✓③ AI가 인간 예술가 스타일 모방 —동의 없이 모방이 우려④ AI는 여전히 인간 도움에 의존 ✓⑤ 데이터에 결함·한계 ✓📌 5개 밑줄 분석①open(공개된) ✓②better(더 잘) ✓③with ✗ 정답 — 정반대 함정!본문 원문: *\"AI may imitate...without their consent\"*(동의 없이)함정 버전:with their consent(동의를 받고) —정반대문맥 검증: \"concerns\"(우려)는동의 없는 모방에 대한 우"}, {"n": 13, "type": "vocab", "typeName": "어휘", "typeColor": "#D97A47", "pts": 3, "focus": "동의어 매칭", "prompt": "<div class=\"q-prompt\"><b>13.</b> 본문 단어들과 의미가 가장 가까운 단어를 짝지은 것 중 적절하지 <b>않은</b> 것은?</div>", "passage": "", "box": "", "choices": ["compose≈create(창작하다)", "exceed≈surpass(능가하다)", "boost≈reduce(줄이다)", "flaws≈defects(결함)", "collaborate≈cooperate(협력하다)"], "a": 2, "isWriting": false, "writingAns": "", "ansText": "③ boost ≈ reduce (반의어 함정)", "detail": "📌 5개 짝 분석①compose(작곡·창작) ≈create(창작) ✓▸ 그룹: compose = create = produce = make②exceed(능가) ≈surpass(능가) ✓▸ 그룹: exceed = surpass = outdo = go beyond▸ 본문: *\"AI cannot exceed human imagination\"*③boost(증진·끌어올리다) ≈reduce(줄이다) ✗반의어 함정! 정답▸ boost 동의어: increase, enhance, improve, raise▸ reduce는 정반대! 본문 *\"boos"}, {"n": 14, "type": "cloze", "typeName": "빈칸", "typeColor": "#B8763D", "pts": 5, "focus": "SIGNATURE⭐ 다양한 결론 빈칸 (3종)", "prompt": "<div class=\"q-prompt\"><b>14.</b> 본문의 (A)·(B)·(C) 각 결론에 들어갈 말로 가장 적절한 것을 고르시오.</div>", "passage": "<div class=\"q-passage\">[본문 — Debate + Conclusion]</div><div style=\"margin:8px 0;padding:8px 12px;background:#f0f4f9;border-radius:6px;font-size:13px;\"><b>(A)</b> <span style=\"display:inline-block;margin:2px 6px;padding:2px 8px;border:1px solid #ddd;border-radius:4px;font-size:12.5px;\"><span class=\"num\">①</span>encourage</span> <span style=\"display:inline-block;margin:2px 6px;padding:2px 8px;border:1px solid #ddd;border-radius:4px;font-size:12.5px;\"><span class=\"num\">②</span>replace</span> <span style=\"display:inline-block;margin:2px 6px;padding:2px 8px;border:1px solid #ddd;border-radius:4px;font-size:12.5px;\"><span class=\"num\">③</span>educate</span> <span style=\"display:inline-block;margin:2px 6px;padding:2px 8px;border:1px solid #ddd;border-radius:4px;font-size:12.5px;\"><span class=\"num\">④</span>celebrate</span> <span style=\"display:inline-block;margin:2px 6px;padding:2px 8px;border:1px solid #ddd;border-radius:4px;font-size:12.5px;\"><span class=\"num\">⑤</span>finance</span> </div><div style=\"margin:8px 0;padding:8px 12px;background:#f0f4f9;border-radius:6px;font-size:13px;\"><b>(B)</b> <span style=\"display:inline-block;margin:2px 6px;padding:2px 8px;border:1px solid #ddd;border-radius:4px;font-size:12.5px;\"><span class=\"num\">①</span>perfected</span> <span style=\"display:inline-block;margin:2px 6px;padding:2px 8px;border:1px solid #ddd;border-radius:4px;font-size:12.5px;\"><span class=\"num\">②</span>expanded</span> <span style=\"display:inline-block;margin:2px 6px;padding:2px 8px;border:1px solid #ddd;border-radius:4px;font-size:12.5px;\"><span class=\"num\">③</span>constrained</span> <span style=\"display:inline-block;margin:2px 6px;padding:2px 8px;border:1px solid #ddd;border-radius:4px;font-size:12.5px;\"><span class=\"num\">④</span>celebrated</span> <span style=\"display:inline-block;margin:2px 6px;padding:2px 8px;border:1px solid #ddd;border-radius:4px;font-size:12.5px;\"><span class=\"num\">⑤</span>copied</span> </div>", "box": "", "choices": ["collaboration", "separation", "destruction", "imitation", "secrecy"], "a": 1, "isWriting": false, "writingAns": "", "ansText": "(A) ② replace · (B) ③ constrained · (C) ① collaboration", "detail": "📌 (A) 위협 측면 — replace① encourage(격려) ✗ ②replace(대체)✓ — 본문 *\"AI will replace humans in more and more areas\"*③ educate ✗ ④ celebrate ✗ ⑤ finance ✗📌 (B) 옹호 측면 — constrained① perfected(완벽) ✗ ② expanded(확장) ✗③constrained(제약)✓ — 본문 *\"limits the output of AI programs\"*④ celebrated ✗ ⑤ copied ✗📌 (C) 균형 측면 —"}, {"n": 15, "type": "cloze", "typeName": "빈칸", "typeColor": "#B8763D", "pts": 3, "focus": "단일 결론 빈칸 — 핵심 한 단어", "prompt": "<div class=\"q-prompt\"><b>15.</b> 다음 글의 빈칸에 들어갈 말로 가장 적절한 것은?</div>", "passage": "<div class=\"q-passage\">\n    AI programs raise both opportunities and concerns. While they can compose music and create realistic virtual influencers, their reliance on existing human data means their creative output has natural <span class=\"q-blank\">______</span>. Human imagination, in contrast, faces no such restrictions.\n  </div>", "box": "", "choices": ["limits", "followers", "contests", "networks", "profits"], "a": 0, "isWriting": false, "writingAns": "", "ansText": "① limits (한계)", "detail": "📌 본문 흐름① AI는 기존 인간 데이터에 의존② 따라서 출력에 자연스러운 ____ 있음③ 대조: 인간 상상력은 그런제한이 없음 (no such restrictions)뒤의\"no such restrictions\"(그런 제약 없음)에서 such = 빈칸 단어.→ 빈칸은 restrictions(제약)와 동의어 =limits📌 5개 선지 한국어 의미①limits=한계, 제한✓ 정답본문 *\"limits the output of AI programs\"*와 *\"no limits or boundaries\"* 직접 단서② followers(팔로워"}, {"n": 16, "type": "cloze", "typeName": "빈칸", "typeColor": "#B8763D", "pts": 3, "focus": "결론 한 줄 빈칸", "prompt": "<div class=\"q-prompt\"><b>16.</b> 다음 글의 빈칸에 들어갈 말로 가장 적절한 것은?</div>", "passage": "<div class=\"q-passage\">\n    The debate over AI is not really a question of whether the technology should exist or be banned. Both sides — those who fear AI and those who embrace it — agree that AI is here to stay. The real question, as the author concludes, is <span class=\"q-blank\">______</span>.\n  </div>", "box": "", "choices": ["whether AI should be allowed in schools and universities only", "how humans and AI can work together ethically", "whether countries should ban AI software immediately", "how much AI subscription services should cost", "whether AI tools should be limited to scientific use"], "a": 1, "isWriting": false, "writingAns": "", "ansText": "② 인간과 AI가 어떻게 윤리적으로 협력할 수 있는지", "detail": "📌 본문 핵심 흐름① AI 존재 자체는 양측 모두 인정② 진짜 질문 = 결론 빈칸③ 본문 결론부 단서:\"figure out how to use AI toolsethicallyand think about howhumans and AI can collaborate\"📌 5개 선지 한국어 해석① \"AI를 학교·대학에서만 허용해야 하는지\" — 본문 무관 ✗②\"인간과 AI가 윤리적으로 함께 일하는 방법\"✓ 정답본문 *\"how to use AI tools ethically and... collaborate\"* 직접 단서③ \"AI 즉시 금지\" —"}, {"n": 17, "type": "cloze", "typeName": "빈칸", "typeColor": "#B8763D", "pts": 3, "focus": "5곳 빈칸 — 들어갈 수 없는 단어", "prompt": "<div class=\"q-prompt\"><b>17.</b> 다음 글의 흐름에 맞게 빈칸 (A)~(E)를 채울 때, 들어갈 수 <b>없는</b> 단어는?</div>", "passage": "<div class=\"q-passage\">\n    AI programs offer many (A) <span class=\"q-blank\">__</span>, including the ability to compose music and create virtual influencers. However, they have also (B) <span class=\"q-blank\">__</span> debate about their impact on humans. Critics worry AI may (C) <span class=\"q-blank\">__</span> human workers, while supporters argue AI still (D) <span class=\"q-blank\">__</span> on human creativity. The future depends on how we (E) <span class=\"q-blank\">__</span> these tools ethically.\n  </div>", "box": "", "choices": ["opportunities", "sparked", "destroy", "depends", "use"], "a": 2, "isWriting": false, "writingAns": "", "ansText": "③ destroy (안 들어감)", "detail": "📌 5개 빈칸 분석(A) \"AI는 많은 ___ 제공\" →opportunities(기회) ✓ — 본문 *\"benefits and new opportunities\"*(B) \"AI가 영향에 대한 논쟁을 ___\" →sparked(촉발) ✓ — 본문 *\"sparked a debate\"*(C) \"AI가 인간 노동자를 ___\" → 보기 중 어디 들어가나?destroy는 본문 *\"replace\"*와 다름(D) \"AI는 여전히 인간 창의성에 ___\" →depends(의존) ✓ — 본문 *\"is still dependent\"*(E) \"이 도구를 윤리"}, {"n": 18, "type": "cloze", "typeName": "빈칸", "typeColor": "#B8763D", "pts": 3, "focus": "paraphrase 결론 빈칸", "prompt": "<div class=\"q-prompt\"><b>18.</b> 다음 글의 빈칸에 들어갈 말로 가장 적절한 것은?</div>", "passage": "<div class=\"q-passage\">\n    Despite the impressive abilities of AI programs to compose music and produce virtual influencers, opponents point out one fundamental truth: AI cannot generate truly original ideas. Its outputs are always shaped by the data it was trained on. In other words, AI's creative range is <span class=\"q-blank\">______</span>.\n  </div>", "box": "", "choices": ["completely independent of human input", "bounded by the imperfect data it learns from", "guaranteed to surpass human imagination eventually", "identical to that of professional human artists", "expanding without any limits or constraints"], "a": 1, "isWriting": false, "writingAns": "", "ansText": "② bounded by the imperfect data it learns from", "detail": "📌 본문 핵심 흐름① 인상적 능력 인정 (작곡·가상 인플루언서)② 그러나 근본적 진실: AI는 진정 독창적 아이디어 생성 불가③ 출력은훈련 데이터에 의해 형성④ 결론(빈칸): AI의 창의 범위는 ____본문 핵심 paraphrase:• 본문:\"shaped by the data it was trained on\"• 빈칸:\"bounded by the imperfect data it learns from\"📌 5개 선지 한국어 해석① \"인간 입력과 완전히 독립적\" — 본문 정반대 ✗②\"학습한 불완전한 데이터에 의해 한계 지어짐\"✓ 정답본문 "}, {"n": 19, "type": "struct", "typeName": "글구조", "typeColor": "#8B4A6F", "pts": 3, "focus": "순서 배열 (A)(B)(C)", "prompt": "<div class=\"q-prompt\"><b>19.</b> 주어진 글 다음에 이어질 글의 순서로 가장 적절한 것은?</div>", "passage": "<div class=\"q-passage\">\n    Many AI programs are open to the public, which means they can be used freely and conveniently.<br/><br/>\n    (A) On the other hand, others think that AI cannot exceed human imagination and that it is still dependent on human assistance.<br/>\n    (B) However, these programs have sparked a debate over their impact on humans.<br/>\n    (C) Since AI has the potential to learn skills and perform them better than humans, some people view it as a threat.\n  </div>", "box": "", "choices": ["(A)-(B)-(C)", "(A)-(C)-(B)", "(B)-(A)-(C)", "(B)-(C)-(A)", "(C)-(B)-(A)"], "a": 3, "isWriting": false, "writingAns": "", "ansText": "④ (B)-(C)-(A)", "detail": "📌 단락 흐름 추적주어진 글: AI 프로그램 공개 (긍정적 사실)▸(B) 첫 번째— \"However, these programs have sparked a debate\"However = 역접. 긍정적 사실 다음 논란 발생.▸(C) 두 번째— \"Since AI has the potential... some people view it as a threat\"논란의첫 입장= 위협론. (B)에서 시작된 논란의 한쪽 입장 제시.▸(A) 세 번째— \"On the other hand, others think...\"On the other hand "}, {"n": 20, "type": "struct", "typeName": "글구조", "typeColor": "#8B4A6F", "pts": 3, "focus": "문장 삽입", "prompt": "<div class=\"q-prompt\"><b>20.</b> 글의 흐름으로 보아, 주어진 문장이 들어가기에 가장 적절한 곳은?</div>", "passage": "<div class=\"q-passage\">\n<b>[ 주어진 문장 ]</b> Some of them have many followers on social media, just like human singers.<br/><br/>\n    Furthermore, computer-generated imagery (commonly known as CGI) has opened up new possibilities in the music industry. ( ① ) Virtual influencers with extremely realistic faces, bodies, and voices have already released several songs. ( ② ) These types of virtual musicians are able to speak and move realistically with the help of their human creators. ( ③ ) Many AI programs are open to the public, which means they can be used freely. ( ④ ) However, these programs have sparked a debate over their impact on humans. ( ⑤ )\n  </div>", "box": "", "choices": [], "a": 1, "isWriting": false, "writingAns": "", "ansText": "②", "detail": "주어진 문장 해석: \"그들 중 일부는 인간 가수처럼 SNS에 많은 팔로워를 가지고 있다.\"📌 두 가지 단서로 ②번 자리 결정▸단서 1: \"Some of them\" 지시어them이 받을 대상 =가상 인플루언서들 (복수).②번 앞 문장:\"Virtual influencers... have already released several songs\"(가상 인플루언서가 곡 발표).→ 그들 중 일부(some of them)에 대한 추가 정보로 자연스럽게 연결.▸단서 2: 본문 흐름②번 뒤 문장:\"These types of virtual music"}, {"n": 21, "type": "struct", "typeName": "글구조", "typeColor": "#8B4A6F", "pts": 3, "focus": "어색한 문장 식별", "prompt": "<div class=\"q-prompt\"><b>21.</b> 다음 글의 흐름상 어색한 문장은?</div>", "passage": "<div class=\"q-passage\">\n    AI programs may lead to changes not only in the art world but also in the music industry. ① These programs are already able to compose songs, and they give you many options. ② You can choose the style and key, such as C major or A minor, and even set how long the song will be. ③ Classical music originated in Europe and developed over several centuries. ④ Once you've entered the information, the program will produce a song that you can edit or use as it is. ⑤ This makes music creation accessible even to those without formal training.\n  </div>", "box": "", "choices": [], "a": 2, "isWriting": false, "writingAns": "", "ansText": "③", "detail": "📌 본문 흐름 분석주제:AI 프로그램의 음악 작곡 능력설명① 작곡 능력 + 선택권 ✓② 구체적 옵션 (스타일·조성·길이) ✓③\"클래식 음악의 유럽 기원\" — 흐름상 이질적 ✗ 정답본문은AI 음악 작곡 기능을 다루는데, ③은 갑자기클래식 음악의 역사적 기원진술. 주제와 무관.④ 정보 입력 후 결과물 (작동 흐름) ✓⑤ 결론 (비전공자도 접근 가능) ✓📌 어색한 문장 식별 핵심본문이 일관된 주제(AI 작곡 기능)로 진행되는데 ③은 갑자기 음악 역사로 빠짐.※ 음악이라는 부분적 연관성으로 그럴듯해 보이지만, 본문 핵심 흐름(AI의 작곡 "}, {"n": 22, "type": "pronoun", "typeName": "대명사·지칭", "typeColor": "#6B5BA0", "pts": 2, "focus": "them 지칭 — 두 명사 미끼", "prompt": "<div class=\"q-prompt\"><b>22.</b> 다음 글의 밑줄 친 <i>them</i>이 가리키는 것으로 가장 적절한 것은?</div>", "passage": "<div class=\"q-passage\">\n    Since AI has the potential to learn <b>skills</b> and perform <i>them</i> better than humans, some people view it as a threat. They worry that <b>AI programs</b> will replace humans in more and more areas.\n  </div>", "box": "", "choices": ["AI programs", "skills", "humans", "some people", "more areas"], "a": 1, "isWriting": false, "writingAns": "", "ansText": "② skills", "detail": "📌 본문 해석: AI는기술을 배우고 인간보다 더 잘그것들을수행할 잠재력이 있기 때문에, 어떤 사람들은 그것을 위협으로 본다. 그들은 AI 프로그램이 점점 더 많은 영역에서 인간을 대체할 것을 우려한다.📌 두 명사 미끼 구조 분석본문에 복수 명사 후보 다수:① AI programs (복수) — 가능 후보② skills (복수) — 가능 후보③ humans (복수) — 가능 후보📌 의미 검증문장:\"learn skills and perform them better than humans\"→ \"기술을 배우고 ~을 더 잘 수행\"무엇을 수행하는"}, {"n": 23, "type": "pronoun", "typeName": "대명사·지칭", "typeColor": "#6B5BA0", "pts": 2, "focus": "it 지칭 — 추상 개념", "prompt": "<div class=\"q-prompt\"><b>23.</b> 다음 글의 밑줄 친 <i>it</i>이 가리키는 것으로 가장 적절한 것은?</div>", "passage": "<div class=\"q-passage\">\n    Since <b>AI</b> can quickly learn new skills and perform them better than humans, some people view <i>it</i> as a serious threat to many human jobs. They worry that AI will replace humans in more and more areas.\n  </div>", "box": "", "choices": ["a song", "AI", "a threat", "some people", "humans"], "a": 1, "isWriting": false, "writingAns": "", "ansText": "② AI", "detail": "📌 본문 해석:AI가 인간보다 새로운 기술을 빠르게 배우고 더 잘 수행할 수 있기 때문에, 어떤 사람들은그것을 많은 인간 일자리에 대한 심각한 위협으로 본다.📌 1단계 — 단수 일치it = 단수 → 단수 후보:① a song (단수) — 후보 가능② AI (단수) — 후보 가능③ a threat (단수) — 후보 가능④ some people 복수 — 제외⑤ humans 복수 — 제외📌 2단계 — 의미 검증문장:\"some people viewitas a serious threat to many human jobs\"→ \"어떤 사람들이 "}, {"n": 24, "type": "pronoun", "typeName": "대명사·지칭", "typeColor": "#6B5BA0", "pts": 2, "focus": "this 지칭 — 앞 문장 받기", "prompt": "
