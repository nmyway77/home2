<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>목동중학교 1학년 — 교과서 한줄해석</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f1ec;--navy:#1F3864;--blue-card:#EBF3FB;--blue-border:#2E75B6;--purple-card:#F3E8FF;--purple-border:#5B2D8E;--teal:#00695C;--gold:#B8860B;--gold2:#f0d070;--cream:#FFF8E7;--orange:#E65100;--shadow:rgba(31,56,100,0.10);--text:#1a1a2e;--text-sub:#4a4a6a;}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);background-image:radial-gradient(ellipse at 10% 0%,rgba(31,56,100,0.06) 0%,transparent 50%),radial-gradient(ellipse at 90% 100%,rgba(91,45,142,0.04) 0%,transparent 50%);font-family:'Noto Sans KR',sans-serif;min-height:100vh;color:var(--text);}

/* NAV */
.top-nav{position:fixed;top:0;left:0;right:0;z-index:200;background:var(--navy);box-shadow:0 3px 16px rgba(31,56,100,0.35);display:flex;align-items:center;padding:0 16px;height:48px;gap:12px;}
.home-btn{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;color:rgba(255,255,255,0.7);text-decoration:none;padding:4px 10px;border-radius:4px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);transition:all 0.2s;white-space:nowrap;}
.home-btn:hover{background:rgba(255,255,255,0.14);color:white;}
.nav-title-bar{font-family:'JetBrains Mono',monospace;font-size:11px;color:rgba(255,255,255,0.5);letter-spacing:1px;}
.nav-badge{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--gold2);border:1px solid rgba(201,168,76,0.3);padding:3px 10px;border-radius:3px;white-space:nowrap;}

/* PASSAGE */
.passage{max-width:860px;margin:0 auto;padding:68px 16px 64px;}

/* PAGE HEADER */
.page-header{margin:0 0 20px;border-left:5px solid var(--navy);padding-left:20px;}
.page-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--blue-border);margin-bottom:8px;}
.page-title{font-family:'Playfair Display',serif;font-size:clamp(17px,3.5vw,28px);font-weight:700;color:var(--navy);line-height:1.2;margin-bottom:6px;}
.page-sub{font-size:12px;color:var(--text-sub);font-weight:300;}

/* VIEW TABS */
.view-tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
.view-tab{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;padding:9px 18px;border-radius:7px;cursor:pointer;transition:all 0.2s;border:2px solid transparent;}
.tab-reading{background:white;color:var(--navy);border-color:rgba(31,56,100,0.2);}
.tab-reading.active{background:var(--navy);color:white;border-color:var(--navy);}
.tab-arrange{background:white;color:var(--orange);border-color:rgba(230,81,0,0.25);}
.tab-arrange.active{background:var(--orange);color:white;border-color:var(--orange);}
.tab-grammar{background:white;color:#1D5C2B;border-color:rgba(29,92,43,0.25);}
.tab-grammar.active{background:#1D5C2B;color:white;border-color:#1D5C2B;}
.tab-vocab{background:white;color:#6A1B9A;border-color:rgba(106,27,154,0.25);}
.tab-vocab.active{background:#6A1B9A;color:white;border-color:#6A1B9A;}

/* HINTS */
.hints{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
.hint{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--text-sub);background:white;border-radius:20px;padding:5px 13px;border:1px solid rgba(0,0,0,0.09);box-shadow:0 1px 4px var(--shadow);}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:14px;}
.leg{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-sub);}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:18px;}
.ctrl-btn{font-family:'JetBrains Mono',monospace;font-size:11px;padding:7px 14px;border-radius:6px;border:1px solid rgba(31,56,100,0.22);background:white;color:var(--navy);cursor:pointer;transition:all 0.2s;box-shadow:0 1px 4px var(--shadow);}
.ctrl-btn:hover,.ctrl-btn.active{background:var(--navy);color:white;}

/* CARDS */
.cards{display:flex;flex-direction:column;gap:13px;}
.s-card{border-radius:10px;border-left:4px solid var(--blue-border);background:var(--blue-card);box-shadow:0 3px 14px var(--shadow);overflow:hidden;cursor:pointer;transition:box-shadow 0.25s,transform 0.2s;animation:slideIn 0.4s ease both;position:relative;}
.s-card.grammar{border-left-color:var(--purple-border);background:var(--purple-card);}
@media(hover:hover) and (pointer:fine){.s-card:hover{box-shadow:0 6px 28px rgba(31,56,100,0.18);transform:translateX(3px);}}
.s-card.playing{box-shadow:0 0 0 3px rgba(46,117,182,0.4),0 6px 28px var(--shadow);}
.s-card.grammar.playing{box-shadow:0 0 0 3px rgba(91,45,142,0.4),0 6px 28px var(--shadow);}
@keyframes slideIn{from{opacity:0;transform:translateX(-14px);}to{opacity:1;transform:translateX(0);}}
.card-top{display:flex;align-items:flex-start;padding:12px 14px 11px;gap:10px;}
.s-num{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;background:var(--navy);color:white;padding:3px 7px;border-radius:4px;flex-shrink:0;margin-top:2px;}
.s-card.grammar .s-num{background:var(--purple-border);}
.s-en{font-family:Georgia,serif;font-size:14.5px;line-height:1.8;color:#1a1a2e;flex:1;}
.s-en .hl{font-weight:700;color:var(--navy);}
.s-en .gm{font-weight:700;color:var(--purple-border);}
.s-en .ref{font-weight:700;color:var(--teal);}
.speak-icon{font-size:15px;flex-shrink:0;margin-top:3px;color:rgba(46,117,182,0.35);transition:color 0.2s,transform 0.2s;padding:5px;border-radius:6px;cursor:pointer;}
@media(hover:hover) and (pointer:fine){.s-card:hover .speak-icon{color:var(--blue-border);transform:scale(1.15);}.s-card.grammar:hover .speak-icon{color:var(--purple-border);}}
@media(hover:none){.speak-icon{font-size:18px;color:rgba(46,117,182,0.55);background:rgba(46,117,182,0.08);border-radius:8px;padding:5px 8px;}.s-card.grammar .speak-icon{color:rgba(91,45,142,0.55);background:rgba(91,45,142,0.08);}}
.wave{display:none;align-items:center;gap:2px;height:16px;margin-top:3px;flex-shrink:0;}
.s-card.playing .wave{display:flex;}
.s-card.playing .speak-icon{display:none;}
.wave span{display:block;width:3px;border-radius:2px;background:var(--blue-border);animation:wb 0.6s ease infinite alternate;}
.s-card.grammar .wave span{background:var(--purple-border);}
.wave span:nth-child(1){height:4px;animation-delay:0s;}.wave span:nth-child(2){height:10px;animation-delay:0.1s;}.wave span:nth-child(3){height:14px;animation-delay:0.2s;}.wave span:nth-child(4){height:8px;animation-delay:0.15s;}.wave span:nth-child(5){height:5px;animation-delay:0.05s;}
@keyframes wb{from{transform:scaleY(0.5);opacity:0.7;}to{transform:scaleY(1.3);opacity:1;}}

/* KR WRAP */
.s-kr-wrap{max-height:0;overflow:hidden;transition:max-height 0.4s cubic-bezier(0.4,0,0.2,1),opacity 0.3s;opacity:0;background:rgba(255,255,255,0.6);border-top:1px dashed transparent;}
@media(hover:hover) and (pointer:fine){.s-card:hover .s-kr-wrap{max-height:800px;opacity:1;border-top-color:rgba(46,117,182,0.2);}.s-card.grammar:hover .s-kr-wrap{border-top-color:rgba(91,45,142,0.2);}}
.s-card.pinned .s-kr-wrap,.s-card.tapped .s-kr-wrap{max-height:800px;opacity:1;border-top-color:rgba(46,117,182,0.2);}
.s-card.grammar.pinned .s-kr-wrap,.s-card.grammar.tapped .s-kr-wrap{border-top-color:rgba(91,45,142,0.2);}
.s-card.vocab-only .s-kr-wrap{max-height:800px;opacity:1;border-top-color:rgba(46,117,182,0.2);}
.s-card.vocab-only .s-kr,.s-card.vocab-only .ref-note,.s-card.vocab-only .s-grammar,.s-card.vocab-only .s-meaning{display:none;}
.s-kr{padding:9px 14px 9px 42px;font-size:13px;line-height:1.8;color:#2d2d4e;}
.s-kr::before{content:"▶ ";color:var(--blue-border);font-size:10px;font-weight:700;}
.s-card.grammar .s-kr::before{color:var(--purple-border);}
.pr{color:var(--teal);font-weight:700;font-size:11.5px;}
.s-vocab{padding:6px 14px 8px 42px;font-size:11px;line-height:1.7;color:var(--text-sub);border-top:1px dashed rgba(46,117,182,0.15);background:rgba(255,255,255,0.4);}
.s-card.grammar .s-vocab{border-top-color:rgba(91,45,142,0.15);}
.vocab-label{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;margin-right:5px;color:var(--blue-border);}
.vocab-en{font-weight:600;color:var(--navy);margin-right:2px;}
.vocab-kr{color:var(--text-sub);margin-right:8px;}
.s-grammar{padding:6px 14px 8px 42px;font-size:11px;line-height:1.7;color:#3d1f5e;background:rgba(91,45,142,0.05);border-top:1px dashed rgba(91,45,142,0.15);}
.grammar-label{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;margin-right:5px;color:var(--purple-border);}
.s-meaning{padding:8px 14px 10px 42px;font-size:12px;line-height:1.9;color:#3d2200;border-top:1.5px solid rgba(230,81,0,0.2);background:linear-gradient(135deg,#FFFDE7,#FFF9E3);}
.meaning-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-weight:700;display:block;margin-bottom:5px;border-left:3px solid var(--gold);padding-left:6px;}
.meaning-body{border-left:2px solid rgba(230,81,0,0.25);padding-left:10px;font-style:italic;}
.meaning-body strong{color:#7a3a00;font-weight:700;font-style:normal;}
.star-line{display:block;margin:2px 0;padding-left:2px;color:#5a3000;font-size:11.5px;}
.bracket{display:inline-block;background:rgba(184,134,11,0.13);border-radius:3px;padding:0 4px;font-weight:700;color:#7a3a00;font-style:normal;}

/* SUMMARY */
.summary-wrap{margin-top:36px;}
.summary-header{background:var(--navy);color:white;font-family:'Playfair Display',serif;font-size:15px;font-weight:700;padding:12px 20px;border-radius:8px 8px 0 0;}
.summary-body{background:var(--cream);border:1px solid rgba(31,56,100,0.15);border-top:none;border-radius:0 0 8px 8px;padding:20px;font-size:13px;line-height:2.0;color:#2a2a3e;box-shadow:0 4px 16px var(--shadow);}
.summary-body p{margin-bottom:10px;}
.story-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-top:16px;}
.story-card{border-radius:8px;overflow:hidden;border:1px solid rgba(0,0,0,0.08);}
.story-card-hdr{padding:9px 14px;color:white;font-size:12px;font-weight:700;}
.story-card-body{padding:10px 14px;font-size:11.5px;line-height:1.8;color:#2d2d2d;}
.story-card-body li{list-style:none;padding-left:12px;position:relative;}
.story-card-body li::before{content:"•";position:absolute;left:0;color:#888;}
.cmp-table{width:100%;border-collapse:collapse;margin-top:14px;font-size:12px;}
.cmp-table th{background:var(--navy);color:white;padding:8px 10px;text-align:left;}
.cmp-table td{padding:7px 10px;border-bottom:1px solid rgba(0,0,0,0.07);}
.cmp-table tr:nth-child(even) td{background:rgba(235,243,251,0.5);}

/* ARRANGE */
.arrange-view{display:none;}
.arrange-view.active{display:block;}
.score-bar{background:var(--navy);border-radius:10px;padding:14px 20px;margin-bottom:20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.score-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;color:rgba(255,255,255,0.45);}
.score-num{font-family:'Playfair Display',serif;font-size:32px;font-weight:700;color:var(--gold2);line-height:1;}
.score-total{font-size:13px;color:rgba(255,255,255,0.35);}
.score-reset-all{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:11px;padding:7px 14px;border-radius:6px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.7);cursor:pointer;}
.arr-card{background:white;border-radius:12px;border:1px solid rgba(0,0,0,0.08);box-shadow:0 3px 14px var(--shadow);margin-bottom:16px;overflow:hidden;animation:slideIn 0.35s ease both;}
.arr-header{background:var(--navy);padding:10px 16px;display:flex;align-items:flex-start;gap:10px;}
.arr-num{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;background:rgba(255,255,255,0.15);color:white;padding:3px 8px;border-radius:4px;flex-shrink:0;margin-top:1px;}
.arr-kr{font-size:12.5px;color:rgba(255,255,255,0.85);line-height:1.6;flex:1;}
.arr-body{padding:14px 16px;}
.answer-zone{display:flex;flex-wrap:wrap;gap:7px;min-height:48px;padding:10px 12px;background:#f0f4ff;border-radius:8px;border:2px dashed rgba(46,117,182,0.3);margin-bottom:10px;transition:border-color 0.2s,background 0.2s;align-content:flex-start;}
.answer-zone.drag-over{border-color:var(--blue-border);background:#ddeeff;}
.answer-zone:empty::before{content:'여기에 단어를 놓으세요';color:rgba(46,117,182,0.35);font-size:12px;font-style:italic;display:flex;align-items:center;height:28px;}
.word-pool{display:flex;flex-wrap:wrap;gap:7px;min-height:44px;padding:10px;background:#f8f8f8;border-radius:8px;border:2px dashed #ddd;margin-bottom:12px;transition:border-color 0.2s,background 0.2s;}
.word-pool.drag-over{border-color:var(--gold);background:#fff9e6;}
.word-chip{display:inline-flex;align-items:center;padding:6px 11px;border-radius:6px;font-family:Georgia,serif;font-size:13.5px;cursor:grab;user-select:none;transition:transform 0.15s,box-shadow 0.15s,opacity 0.15s;background:var(--blue-card);border:1.5px solid var(--blue-border);color:var(--navy);font-weight:600;white-space:nowrap;}
.word-chip:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(46,117,182,0.25);}
.word-chip.dragging{opacity:0.35;transform:scale(0.93);cursor:grabbing;}
.word-chip.ok-chip{background:#E8F5E9;border-color:#2E7D32;color:#1B5E20;}
.arr-result{display:none;padding:9px 13px;border-radius:7px;font-size:13px;font-weight:600;margin-bottom:10px;align-items:center;gap:8px;}
.arr-result.show{display:flex;}
.arr-result.ok{background:#E8F5E9;color:#1B5E20;border:1px solid #A5D6A7;}
.arr-result.ng{background:#FFEBEE;color:#B71C1C;border:1px solid #FFCDD2;}
.arr-btns{display:flex;gap:8px;flex-wrap:wrap;}
.arr-check{font-family:'JetBrains Mono',monospace;font-size:11px;padding:7px 16px;border-radius:6px;border:none;background:var(--navy);color:white;cursor:pointer;transition:background 0.2s;}
.arr-reset{font-family:'JetBrains Mono',monospace;font-size:11px;padding:7px 14px;border-radius:6px;border:1px solid rgba(0,0,0,0.15);background:white;color:#666;cursor:pointer;}
.arr-show-ans{font-family:'JetBrains Mono',monospace;font-size:11px;padding:7px 14px;border-radius:6px;border:1px solid rgba(230,81,0,0.3);background:white;color:var(--orange);cursor:pointer;}
.ans-reveal{display:none;margin-top:8px;padding:10px 12px;background:var(--cream);border-radius:6px;border-left:3px solid var(--gold);font-family:Georgia,serif;font-size:13px;color:#3d2200;line-height:1.7;}
.ans-reveal.show{display:block;}
.touch-hint{text-align:center;font-size:11px;font-family:'JetBrains Mono',monospace;color:rgba(0,0,0,0.3);letter-spacing:1px;margin-bottom:14px;padding:7px;background:rgba(0,0,0,0.03);border-radius:6px;}

/* GRAMMAR */
.grammar-view{display:none;}
.grammar-view.active{display:block;}
.gtype-header{background:var(--navy);color:white;border-radius:8px 8px 0 0;padding:11px 18px;display:flex;align-items:center;gap:10px;font-family:'Playfair Display',serif;font-size:15px;font-weight:700;}
.gtype-desc{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:400;letter-spacing:0.5px;color:rgba(255,255,255,0.6);}
.gtype-body{background:white;border:1px solid rgba(31,56,100,0.12);border-top:none;border-radius:0 0 8px 8px;padding:18px;margin-bottom:6px;box-shadow:0 3px 14px var(--shadow);}
.gtype-final{margin-top:10px;margin-bottom:24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.gtype-final-btn{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;padding:10px 24px;border-radius:8px;border:none;cursor:pointer;transition:background 0.2s;}
.gtype-final-btn.ab-btn{background:var(--navy);color:white;box-shadow:0 3px 10px rgba(31,56,100,0.3);}
.gtype-final-btn.er-btn{background:#5B2D8E;color:white;box-shadow:0 3px 10px rgba(91,45,142,0.3);}
.gtype-final-btn.fi-btn{background:#C55A11;color:white;box-shadow:0 3px 10px rgba(197,90,17,0.3);}
.gtype-final-score{font-size:13px;color:var(--text-sub);}
.g-score-bar{background:linear-gradient(135deg,#1D5C2B,#2E7D32);border-radius:10px;padding:14px 20px;margin-bottom:20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.g-score-num{font-family:'Playfair Display',serif;font-size:32px;font-weight:700;color:#c8f7c5;line-height:1;}
.g-score-total{font-size:13px;color:rgba(255,255,255,0.4);}
.g-score-reset{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:11px;padding:7px 14px;border-radius:6px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.8);cursor:pointer;}
.gq-card{background:#fafafa;border-radius:8px;border:1px solid rgba(0,0,0,0.08);margin-bottom:14px;overflow:hidden;}
.gq-top{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;}
.gq-num{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;background:var(--navy);color:white;padding:3px 8px;border-radius:4px;flex-shrink:0;margin-top:2px;}
.gq-sent{font-family:Georgia,serif;font-size:14px;line-height:1.85;color:#1a1a2e;flex:1;}
.ab-choice{display:inline-flex;gap:0;border:1.5px solid var(--blue-border);border-radius:5px;overflow:hidden;vertical-align:middle;margin:0 2px;font-family:'JetBrains Mono',monospace;font-size:12px;}
.ab-opt{padding:2px 8px;cursor:pointer;background:white;color:var(--navy);transition:background 0.15s,color 0.15s;border:none;font-family:Georgia,serif;font-size:13px;font-weight:600;}
.ab-opt:first-child{border-right:1px solid rgba(46,117,182,0.3);}
.ab-opt:hover{background:var(--blue-card);}
.ab-opt.selected{background:var(--navy);color:white;}
.ab-opt.correct-sel{background:#2E7D32;color:white;}
.ab-opt.wrong-sel{background:#C62828;color:white;}
.err-word{display:inline-block;border-bottom:2px solid var(--blue-border);cursor:pointer;padding:0 3px;margin:0 2px;border-radius:2px 2px 0 0;transition:background 0.15s;font-weight:600;}
.err-word:hover{background:rgba(46,117,182,0.1);}
.err-word.selected-err{background:rgba(230,81,0,0.15);border-bottom-color:var(--orange);}
.err-word.correct-err{background:#E8F5E9;border-bottom-color:#2E7D32;color:#1B5E20;}
.err-word.wrong-err{background:#FFEBEE;border-bottom-color:#C62828;color:#B71C1C;}
.fill-wrap{display:inline-flex;align-items:center;gap:4px;vertical-align:middle;margin:0 3px;}
.fill-base{font-family:'JetBrains Mono',monospace;font-size:11px;color:rgba(0,0,0,0.4);letter-spacing:0.3px;}
.fill-input{font-family:Georgia,serif;font-size:13px;border:none;border-bottom:2px solid var(--blue-border);background:transparent;color:var(--navy);width:110px;text-align:center;outline:none;padding:1px 4px;transition:border-color 0.2s;font-weight:600;}
.fill-input:focus{border-bottom-color:var(--orange);}
.fill-input.correct-fill{border-bottom-color:#2E7D32;color:#1B5E20;background:#E8F5E9;border-radius:4px;}
.fill-input.wrong-fill{border-bottom-color:#C62828;color:#B71C1C;background:#FFEBEE;border-radius:4px;}
.gq-feedback{display:none;padding:8px 14px 9px;font-size:12px;line-height:1.7;border-top:1px dashed rgba(0,0,0,0.08);}
.gq-feedback.show{display:block;}
.gq-feedback.ok{background:#E8F5E9;color:#1B5E20;}
