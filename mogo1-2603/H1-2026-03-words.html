for(let __i = 1; __i < 60; __i++){ if(!UNITS[__i]) UNITS[__i] = []; }

let currentUnit = 0;
let currentTab  = "vocab";
let spellScores   = {};
let meaningScores = {};

const UNIT_LABELS = [
  "주요단어 250"
];

function getVoice(){
  const v = speechSynthesis.getVoices();
  return v.find(x=>x.lang==="en-US"&&x.name.includes("Google"))
      || v.find(x=>x.lang.startsWith("en-US"))
      || v.find(x=>x.lang.startsWith("en"))
      || null;
}
speechSynthesis.addEventListener("voiceschanged", ()=>{});
function speakWord(word, e){
  if(e) e.stopPropagation();
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(word);
  u.lang = "en-US"; u.rate = 0.82;
  const v = getVoice(); if(v) u.voice = v;
  speechSynthesis.speak(u);
}

function initSelect(){
  const sel = document.getElementById("unitSelect");
  sel.innerHTML = "";
  for(let i = 0; i < UNIT_LABELS.length; i++){
    const opt = document.createElement("option");
    opt.value = i;
    const cnt = UNITS[i].length;
    opt.textContent = UNIT_LABELS[i] + (cnt > 0 ? " (" + cnt + "단어)" : " (준비중)");
    sel.appendChild(opt);
  }
}

function changeUnit(idx){
  currentUnit = parseInt(idx);
  document.getElementById("unitSelect").value = currentUnit;
  const cnt = UNITS[currentUnit].length;
  document.getElementById("unitInfoBadge").textContent = cnt > 0 ? cnt + " 단어" : "준비중";
  spellScores = {}; meaningScores = {};
  renderTab();
}
function prevUnit(){if(currentUnit>0) changeUnit(currentUnit-1);}
function nextUnit(){if(currentUnit<UNIT_LABELS.length-1) changeUnit(currentUnit+1);}

function switchTab(tab){
  currentTab = tab;
  const allPanels = ["Vocab","Spell","Meaning","PrintSpell","PrintMeaning"];
  const allTabs   = ["V","S","M","PS","PM"];
  allPanels.forEach(p => document.getElementById("panel"+p).classList.remove("active"));
  allTabs.forEach(t => { const el=document.getElementById("tab"+t); if(el) el.classList.remove("active"); });
  if(tab==="vocab")             { document.getElementById("panelVocab").classList.add("active");        document.getElementById("tabV").classList.add("active"); }
  else if(tab==="spell")        { document.getElementById("panelSpell").classList.add("active");        document.getElementById("tabS").classList.add("active"); }
  else if(tab==="meaning")      { document.getElementById("panelMeaning").classList.add("active");      document.getElementById("tabM").classList.add("active"); }
  else if(tab==="printSpell")   { document.getElementById("panelPrintSpell").classList.add("active");   document.getElementById("tabPS").classList.add("active"); }
  else if(tab==="printMeaning") { document.getElementById("panelPrintMeaning").classList.add("active"); document.getElementById("tabPM").classList.add("active"); }
  renderTab();
}

function renderTab(){
  if(currentTab === "vocab")             buildVocabCards();
  else if(currentTab === "spell")        buildSpellQuiz();
  else if(currentTab === "meaning")      buildMeaningQuiz();
  else if(currentTab === "printSpell")   buildPrintView("spell");
  else if(currentTab === "printMeaning") buildPrintView("meaning");
}

function buildVocabCards(){
  const box = document.getElementById("vocabContent");
  box.innerHTML = "";
  const words = UNITS[currentUnit];
  if(words.length === 0){ showEmpty(box); return; }
  const grid = document.createElement("div");
  grid.className = "vcard-grid";
  words.forEach((v, i)=>{
    const synHtml  = v.syn && v.syn.length ? `<div class="vcard-section"><div class="vcard-section-label">동의어</div><div class="vcard-items"><span class="vcard-syn">${v.syn.join(", ")}</span></div></div>` : "";
    const antHtml  = v.ant && v.ant.length ? `<div class="vcard-section"><div class="vcard-section-label">반의어</div><div class="vcard-items"><span class="vcard-ant">${v.ant.join(", ")}</span></div></div>` : "";
    const phraseHtml = v.phrases && v.phrases.length ? `<div class="vcard-section"><div class="vcard-section-label">어구 / 숙어</div><div class="vcard-items">${v.phrases.map(p=>`<div class="vcard-phrase">• ${p}</div>`).join("")}</div></div>` : "";
    const div = document.createElement("div");
    div.className = "vcard";
    div.style.animationDelay = (i * 30) + "ms";
    div.onclick = function(){
      const isOpen = this.classList.contains("open");
      document.querySelectorAll(".vcard.open").forEach(c => c.classList.remove("open"));
      if(!isOpen) this.classList.add("open");
    };
    div.innerHTML = `
      <div class="vcard-front">
        <div class="vcard-en-row">
          <span class="vcard-num">${String(currentUnit*40+i+1).padStart(2,"0")}</span>
          <div class="vcard-en">${v.en}</div>
          <button class="vcard-speak" onclick="speakWord('${v.en}',event)">🔊</button>
        </div>
        <div class="vcard-pos-kr">${v.pos} <span class="open-hint">클릭하면 뜻 보기 ▼</span></div>
      </div>
      <div class="vcard-back">
        <div class="vcard-back-inner">
          <div class="vcard-kr">${v.kr}</div>
          ${synHtml}${antHtml}${phraseHtml}
        </div>
      </div>`;
    grid.appendChild(div);
  });
  box.appendChild(grid);
}

function buildSpellQuiz(){
  const box = document.getElementById("spellContent");
  box.innerHTML = "";
  const words = UNITS[currentUnit];
  if(words.length === 0){ showEmpty(box); return; }
  const hint = document.createElement("div");
  hint.className = "touch-hint";
  hint.innerHTML = "💡 한국어 뜻을 보고 영어 철자를 입력하세요 — Enter 또는 버튼으로 확인";
  box.appendChild(hint);
  words.forEach((v, i)=>{
    const card = document.createElement("div");
    card.className = "quiz-card";
    card.style.animationDelay = (i * 30) + "ms";
    card.innerHTML = `
      <div class="quiz-top">
        <span class="quiz-num">${String(i+1).padStart(2,"0")}</span>
        <div class="quiz-prompt">
          <div style="font-size:13.5px;color:var(--text);font-weight:700;">${v.kr.split(";")[0].trim()}</div>
          <div style="margin-top:6px;font-size:11px;color:var(--text-sub);">${v.pos}</div>
          <div style="margin-top:6px;">
            <input class="quiz-input" id="sp-${i}" placeholder="영어 단어 입력" autocomplete="off" spellcheck="false">
          </div>
        </div>
        <button class="vcard-speak" onclick="speakWord('${v.en}',event)" style="align-self:center;">🔊</button>
      </div>
      <div class="quiz-fb" id="sp-fb-${i}"></div>`;
    setTimeout(()=>{
      const inp = document.getElementById("sp-"+i);
      if(inp) inp.addEventListener("keydown", e=>{ if(e.key==="Enter") checkSpell(i); });
    }, 0);
    box.appendChild(card);
  });
  const wrap = document.createElement("div");
  wrap.className = "section-check";
  wrap.innerHTML = `<button class="section-check-btn spell" onclick="checkAllSpell()">✓ 전체 철자 확인</button><span class="section-score" id="spell-score"></span><button class="gq-reset" onclick="resetSpell()">↺ 초기화</button>`;
  box.appendChild(wrap);
}

function checkSpell(i){
  const words = UNITS[currentUnit];
  const inp = document.getElementById("sp-"+i);
  if(!inp) return;
  const ok = inp.value.trim().toLowerCase() === words[i].en.toLowerCase();
  inp.classList.remove("ok","ng"); inp.classList.add(ok?"ok":"ng");
  const fb = document.getElementById("sp-fb-"+i);
  fb.className = "quiz-fb show " + (ok?"ok":"ng");
  fb.innerHTML = ok ? "🎉 정답!" : "❌ 정답: <strong>" + words[i].en + "</strong>";
  spellScores[i] = ok ? 1 : 0;
  const done = Object.keys(spellScores).length;
  const correct = Object.values(spellScores).filter(v=>v===1).length;
  const sc = document.getElementById("spell-score");
  if(sc) sc.textContent = correct + " / " + done + " 정답";
}
function checkAllSpell(){ UNITS[currentUnit].forEach((_,i)=>checkSpell(i)); }
function resetSpell(){
  spellScores = {};
  UNITS[currentUnit].forEach((_,i)=>{
    const inp = document.getElementById("sp-"+i);
    if(inp){ inp.value=""; inp.className="quiz-input"; }
    const fb = document.getElementById("sp-fb-"+i);
    if(fb) fb.className = "quiz-fb";
  });
  const sc = document.getElementById("spell-score");
  if(sc) sc.textContent = "";
}

function buildMeaningQuiz(){
  const box = document.getElementById("meaningContent");
  box.innerHTML = "";
  const words = UNITS[currentUnit];
  if(words.length === 0){ showEmpty(box); return; }
  const hint = document.createElement("div");
  hint.className = "touch-hint";
  hint.innerHTML = "💡 영어 단어를 보고 알맞은 뜻을 선택하세요";
  box.appendChild(hint);
  const shuffled = [...words].sort(()=>Math.random()-0.5);
  shuffled.forEach((v, i)=>{
    const wrongs = words.filter(w=>w.en!==v.en).sort(()=>Math.random()-0.5).slice(0,3).map(w=>w.kr.split(";")[0].trim());
    const correct = v.kr.split(";")[0].trim();
    const choices = [...wrongs, correct].sort(()=>Math.random()-0.5);
    const card = document.createElement("div");
    card.className = "quiz-card";
    card.style.animationDelay = (i * 30) + "ms";
    card.dataset.answer = correct;
    card.innerHTML = `
      <div class="quiz-top">
        <span class="quiz-num" style="background:#1D5C2B;">${String(i+1).padStart(2,"0")}</span>
        <div class="quiz-prompt">
          <div style="font-family:Georgia,serif;font-size:17px;font-weight:700;color:var(--navy);">${v.en}</div>
          <div style="font-size:11px;color:rgba(0,0,0,0.3);font-family:'JetBrains Mono',monospace;margin-top:2px;">${v.pos}</div>
        </div>
        <button class="vcard-speak" onclick="speakWord('${v.en}',event)">🔊</button>
      </div>
      <div class="choices" id="mc-${i}">
        ${choices.map(ch=>`<button class="choice-btn" data-val="${ch.replace(/"/g,"&quot;")}" onclick="checkMeaning(${i},this)">${ch}</button>`).join("")}
      </div>
      <div class="quiz-fb" id="mc-fb-${i}"></div>`;
    box.appendChild(card);
  });
  const wrap = document.createElement("div");
  wrap.className = "section-check";
  wrap.innerHTML = `<span class="section-score" id="meaning-score"></span><button class="gq-reset" onclick="buildMeaningQuiz()">↺ 초기화</button>`;
  box.appendChild(wrap);
}

function checkMeaning(i, btn){
  const card = btn.closest(".quiz-card");
  const correct = card.dataset.answer;
  const isOk = btn.dataset.val === correct;
  card.querySelectorAll(".choice-btn").forEach(b=>{
    b.onclick = null;
    if(b.dataset.val === correct) b.classList.add("ok");
    else if(b===btn && !isOk) b.classList.add("ng");
  });
  const fb = document.getElementById("mc-fb-"+i);
  fb.className = "quiz-fb show " + (isOk?"ok":"ng");
  fb.innerHTML = isOk ? "🎉 정답!" : "❌ 정답: <strong>" + correct + "</strong>";
  meaningScores[i] = isOk ? 1 : 0;
  const done = Object.keys(meaningScores).length;
  const ok = Object.values(meaningScores).filter(v=>v===1).length;
  const sc = document.getElementById("meaning-score");
  if(sc) sc.textContent = ok + " / " + done + " 정답";
}

function buildPrintView(type){
  const words  = UNITS[currentUnit];
  const boxId  = type === "spell" ? "printSpellContent" : "printMeaningContent";
  const box    = document.getElementById(boxId);
  box.innerHTML = "";
  if(!words || words.length === 0){ showEmpty(box); return; }
  const unitLabel = UNIT_LABELS[currentUnit] || ((currentUnit+1) + "과");
  const isSpell = type === "spell";
  const title   = isSpell ? "철자 쓰기" : "뜻 쓰기";
  const col1    = isSpell ? "한글뜻" : "영단어";
  const PER_PAGE = 40; // 20 left + 20 right per A4 page

  function makeRows(arr, startNo){
    // 항상 20행 출력 — 단어가 없는 행은 모두 공란
    const rows = [];
    for(let i = 0; i < 20; i++){
      const v = arr[i];
      if(v){
        const hint = isSpell ? v.kr.split(";")[0].trim() : v.en;
        rows.push(`<tr><td class="td-no">${startNo+i}</td><td class="td-write"></td><td class="td-hint">${hint}</td></tr>`);
      } else {
        rows.push(`<tr><td class="td-no"></td><td class="td-write"></td><td class="td-hint"></td></tr>`);
      }
    }
    return rows.join("");
  }

  const totalPages = Math.ceil(words.length / PER_PAGE);
  let pagesHtml = "";
  for(let p = 0; p < totalPages; p++){
    const baseIdx   = p * PER_PAGE;        // 0, 40, 80, ...
    const leftArr   = words.slice(baseIdx, baseIdx + 20);
    const rightArr  = words.slice(baseIdx + 20, baseIdx + 40);
    const leftStart  = baseIdx + 1;        // 1, 41, 81, ...
    const rightStart = baseIdx + 21;       // 21, 61, 101, ...
    const pageNo = p + 1;
    pagesHtml += `
      <div class="print-page" data-page="${pageNo}">
        <div class="print-unit-title">✦ 2026년 3월 고1 주요단어 250 ${unitLabel} — ${title} (${pageNo}/${totalPages})</div>
        <div class="print-unit-sub">목동서로영어학원 · 0505.co.kr</div>
        <div class="print-name-row">
          <span>이름: <span class="print-name-box"></span></span>
          <span>점수: <span class="print-name-box"></span></span>
        </div>
        <div class="print-two-col">
          <table class="pt"><thead><tr><th class="td-no">No.</th><th>제시어</th><th>${col1}</th></tr></thead><tbody>${makeRows(leftArr, leftStart)}</tbody></table>
          <table class="pt"><thead><tr><th class="td-no">No.</th><th>제시어</th><th>${col1}</th></tr></thead><tbody>${makeRows(rightArr, rightStart)}</tbody></table>
        </div>
        <div class="print-wm">✦ 목동서로영어학원 · 본 자료는 목동서로영어학원에서 제작하였습니다 · 0505.co.kr ✦</div>
      </div>`;
  }

  box.innerHTML = `
    <div class="print-view-header">
      <span class="print-view-title">🖨️ ${unitLabel} — ${title} 프린트 (${totalPages}장)</span>
      <button class="print-exec-btn" onclick="execPrint('${type}')">🖨️ 인쇄하기</button>
    </div>
    <div class="print-table-wrap" id="printContent-${type}">
      ${pagesHtml}
    </div>`;
}

function execPrint(type){ window.print(); }

function showEmpty(box){
  const label = UNIT_LABELS[currentUnit] || ((currentUnit+1) + "과");
  box.innerHTML = `<div class="empty-unit"><div class="empty-unit-icon">📝</div><div class="empty-unit-title">${label} 단어 데이터 준비중</div><div class="empty-unit-desc">아직 단어 데이터가 입력되지 않았습니다.</div></div>`;
}

initSelect();
changeUnit(0);
